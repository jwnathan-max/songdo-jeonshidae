}

// ──────────────────────────────────────────────
//  자동 배정 알고리즘
// ──────────────────────────────────────────────
function autoAssign(subs, mems, prevRotation, ym, prevCounts = {}) {
  const slotApplicants = {};
  for (const [name, d] of Object.entries(subs)) {
    if (!d || !d.slots) continue;
    for (const volSlotKey of d.slots) {
      const [volSlotId, dateStr] = volSlotKey.split('__');
      if (volSlotId === 'sat-aft') {
        const k1 = `sat-aft-1__${dateStr}`;
        const k8 = `sat-aft-8__${dateStr}`;
        if (!slotApplicants[k1]) slotApplicants[k1] = [];
        if (!slotApplicants[k8]) slotApplicants[k8] = [];
        if (!slotApplicants[k1].includes(name)) slotApplicants[k1].push(name);
        if (!slotApplicants[k8].includes(name)) slotApplicants[k8].push(name);
      } else {
        if (!slotApplicants[volSlotKey]) slotApplicants[volSlotKey] = [];
        if (!slotApplicants[volSlotKey].includes(name)) slotApplicants[volSlotKey].push(name);
      }
    }
  }

  // 이번 달 배정 횟수 (이전 달 확정 데이터도 가중치로 반영)
  const assignCount = {};
  for (const m of Object.values(mems)) {
    assignCount[m.name] = (prevCounts[m.name] || 0) * 0.5; // 이전 달은 50% 가중치
  }

  // 인도자 배정 횟수 (이번 달 내에서 골고루 분배용)
  const leaderCount = {};

  // 인도자 로테이션
  const rotation = { ...prevRotation };
  if (!rotation.lastLeaderIdx) rotation.lastLeaderIdx = {};

  const resultAssignments = {};

  // 날짜 순서대로 처리 — 같은 날/같은 주 내에서 leaderCount가 누적되어 골고루 배정됨
  const slotsByDate = {};
  for (const sk of Object.keys(slotApplicants)) {
    const dateStr = sk.split('__')[1];
    if (!slotsByDate[dateStr]) slotsByDate[dateStr] = [];
    slotsByDate[dateStr].push(sk);
  }

  for (const dateStr of Object.keys(slotsByDate).sort()) {
    const slots = slotsByDate[dateStr];
    const satKeys = slots.filter(s => s.startsWith('sat-aft-'));
    const normalKeys = slots.filter(s => !s.startsWith('sat-aft-')).sort();

    // 일반 슬롯 먼저 (금 새벽 → 금 저녁 등)
    for (const slotKey of normalKeys) {
      const [slotId] = slotKey.split('__');
      const slotDef = ASSIGN_SLOTS.find(s => s.id === slotId);
      if (!slotDef) continue;
      const assigned = assignSlot(slotApplicants[slotKey], mems, assignCount, leaderCount, rotation, slotId, MAX_PER_SLOT);
      resultAssignments[slotKey] = assigned;
      assigned.teams.forEach(team => {
        team.members?.forEach(x => {
          assignCount[x.name] = (assignCount[x.name] || 0) + 1;
          if (x.role === 'leader') leaderCount[x.name] = (leaderCount[x.name] || 0) + 1;
        });
      });
    }

    // 토요일 슬롯 (1공구 + 8공구 함께)
    if (satKeys.length > 0) {
      const k1 = `sat-aft-1__${dateStr}`;
      const k8 = `sat-aft-8__${dateStr}`;
      const allApplicants = [...new Set([...(slotApplicants[k1]||[]), ...(slotApplicants[k8]||[])])];
      const satResult = assignSatSlots(allApplicants, mems, assignCount, leaderCount, rotation, dateStr);
      if (satResult.zone1) resultAssignments[k1] = satResult.zone1;
      if (satResult.zone8) resultAssignments[k8] = satResult.zone8;
      [satResult.zone1, satResult.zone8].forEach(zone => {
        if (!zone) return;
        zone.teams.forEach(team => {
          team.members?.forEach(x => {
            assignCount[x.name] = (assignCount[x.name] || 0) + 1;
            if (x.role === 'leader') leaderCount[x.name] = (leaderCount[x.name] || 0) + 1;
          });
        });
      });
    }
  }

  // 공평성 보정: 신청했지만 0회 배정된 사람 처리 (다음 배정 우선순위 기록)
  const submittedNames = Object.keys(subs);
  const zeroAssigned = submittedNames.filter(n => (assignCount[n] || 0) === 0);
  rotation.priorityNext = zeroAssigned;

  return { assignments: resultAssignments, rotation };
}

function assignSlot(applicantNames, mems, assignCount, leaderCount, rotation, slotId, maxCount) {
  const memMap = {};
  for (const [id, m] of Object.entries(mems)) memMap[m.name] = { id, ...m };

  // 후보 목록
  let candidates = applicantNames.map(n => memMap[n]).filter(Boolean);

  // 공평성 보정: priorityNext에 있는 사람 먼저
  const priority = rotation.priorityNext || [];
  candidates.sort((a, b) => {
    const pa = priority.includes(a.name) ? 0 : 1;
    const pb = priority.includes(b.name) ? 0 : 1;
    if (pa !== pb) return pa - pb;
    return (assignCount[a.name] || 0) - (assignCount[b.name] || 0);
  });

  // 인도자 배정 — 이번 달 인도 횟수 적은 순 우선, 동순위면 로테이션
  let leader = null;
  const leaderCandidates = candidates.filter(c => c.gender === '형제' && c.canLead);
  if (leaderCandidates.length > 0) {
    leaderCandidates.sort((a, b) => {
      const laDiff = (leaderCount[a.name]||0) - (leaderCount[b.name]||0);
      if (laDiff !== 0) return laDiff;
      return (assignCount[a.name]||0) - (assignCount[b.name]||0);
    });
    const minLeader = leaderCount[leaderCandidates[0].name] || 0;
    const tied = leaderCandidates.filter(c => (leaderCount[c.name]||0) === minLeader);
    const lastIdx = rotation.lastLeaderIdx?.[slotId] ?? -1;
    const nextIdx = (lastIdx + 1) % tied.length;
    leader = tied[nextIdx];
    if (!rotation.lastLeaderIdx) rotation.lastLeaderIdx = {};
    rotation.lastLeaderIdx[slotId] = nextIdx;
  }

  // 나머지 배정 (인도자 제외)
  const remaining = candidates.filter(c => c.name !== leader?.name);
  // 파이오니아 우선, 배정 횟수 적은 순, 동순위 랜덤
  remaining.sort((a, b) => {
    if (a.isPioneer !== b.isPioneer) return a.isPioneer ? -1 : 1;
    const diff = (assignCount[a.name]||0) - (assignCount[b.name]||0);
    if (diff !== 0) return diff;
    return Math.random() - 0.5;
  });

  const picked = remaining.slice(0, leader ? maxCount - 1 : maxCount);
  const allPicked = leader ? [leader, ...picked] : picked;

  const teams = buildTeams(allPicked, leader, mems);
  return { teams };
}

function assignSatSlots(applicantNames, mems, assignCount, leaderCount, rotation, dateStr) {
  const memMap = {};
  for (const [id, m] of Object.entries(mems)) memMap[m.name] = { id, ...m };
  const candidates = applicantNames.map(n => memMap[n]).filter(Boolean);
  const priority = rotation.priorityNext || [];

  // 인도자 배정 (1공구, 8공구 각각) — 이번 달 인도 횟수 적은 순 우선
  const leaderCandidates = candidates.filter(c => c.gender === '형제' && c.canLead);
  leaderCandidates.sort((a, b) => {
    const laDiff = (leaderCount[a.name]||0) - (leaderCount[b.name]||0);
    if (laDiff !== 0) return laDiff;
    const pa = priority.includes(a.name) ? 0 : 1;
    const pb = priority.includes(b.name) ? 0 : 1;
    if (pa !== pb) return pa - pb;
    return (assignCount[a.name]||0) - (assignCount[b.name]||0);
  });

  let leader1 = null, leader8 = null;
  if (leaderCandidates.length >= 1) leader1 = leaderCandidates[0];
  if (leaderCandidates.length >= 2) leader8 = leaderCandidates[1];

  const usedLeaders = new Set([leader1?.name, leader8?.name].filter(Boolean));

  const zone1Members = leader1 ? [leader1] : [];
  const zone8Members = leader8 ? [leader8] : [];
  const usedNames = new Set([...zone1Members.map(x=>x.name), ...zone8Members.map(x=>x.name)]);

  // 인도자의 배우자가 신청했으면 같은 구역에 우선 배치
  [{ leader: leader1, zone: zone1Members }, { leader: leader8, zone: zone8Members }].forEach(({ leader, zone }) => {
    if (!leader?.spouseId) return;
    const spouseEntry = Object.entries(mems).find(([id]) => id === leader.spouseId);
    if (!spouseEntry) return;
    const spouseName = spouseEntry[1].name;
    const spouseCand = candidates.find(c => c.name === spouseName && !usedNames.has(c.name));
    if (spouseCand) { zone.push(spouseCand); usedNames.add(spouseName); }
  });

  // 커플 쌍 추출
  const nonLeaders = candidates.filter(c => !usedNames.has(c.name));
  const couples = []; // [{a, b}]
  const singles = [];
  const paired = new Set();
  for (const m of nonLeaders) {
    if (paired.has(m.name)) continue;
    if (m.spouseId) {
      const spouse = Object.values(mems).find(x => x.name !== m.name && /* id match */ true);
      // find spouse by spouseId
      const spouseEntry = Object.entries(mems).find(([id]) => id === m.spouseId);
      if (spouseEntry) {
        const spouseName = spouseEntry[1].name;
        const spouseCand = nonLeaders.find(c => c.name === spouseName);
        if (spouseCand && !paired.has(spouseCand.name)) {
          couples.push({ a: m, b: spouseCand });
          paired.add(m.name);
          paired.add(spouseCand.name);
          continue;
        }
      }
    }
    singles.push(m);
  }
  const solos = nonLeaders.filter(c => !paired.has(c.name) && !couples.some(cp => cp.a.name === c.name || cp.b.name === c.name));

  // 커플을 두 구역에 균등 배분
  let c1 = 0, c8 = 0;
  for (const couple of couples) {
    const z1Free = MAX_PER_SLOT - zone1Members.length;
    const z8Free = MAX_PER_SLOT - zone8Members.length;
    if (z1Free >= 2 && (c1 <= c8 || z8Free < 2)) {
      zone1Members.push(couple.a, couple.b);
      c1++;
    } else if (z8Free >= 2) {
      zone8Members.push(couple.a, couple.b);
      c8++;
    }
    usedNames.add(couple.a.name);
    usedNames.add(couple.b.name);
  }

  // 나머지 개인 신청자 파이오니아 우선, 배정 횟수 적은 순
  const remainingSingles = [...solos, ...singles.filter(s => !usedNames.has(s.name))];
  remainingSingles.sort((a, b) => {
    if (a.isPioneer !== b.isPioneer) return a.isPioneer ? -1 : 1;
    return (assignCount[a.name]||0) - (assignCount[b.name]||0);
  });

  for (const m of remainingSingles) {
    if (usedNames.has(m.name)) continue;
    if (zone1Members.length <= zone8Members.length && zone1Members.length < MAX_PER_SLOT) {
      zone1Members.push(m);
    } else if (zone8Members.length < MAX_PER_SLOT) {
      zone8Members.push(m);
    } else if (zone1Members.length < MAX_PER_SLOT) {
      zone1Members.push(m);
    }
    usedNames.add(m.name);
  }

  return {
    zone1: zone1Members.length > 0 ? { teams: buildTeams(zone1Members, leader1, mems) } : null,
    zone8: zone8Members.length > 0 ? { teams: buildTeams(zone8Members, leader8, mems) } : null,
  };
}

// 팀 구성 — 무조건 2명씩 3팀 (총 6명)
// 우선순위: 부부(커플) → 인도자와 파이오니아 먼저 → 나머지 순서대로
function buildTeams(allMembers, leader, mems) {
  if (allMembers.length === 0) return [];
  const memMap = {};
  for (const [id, m] of Object.entries(mems)) memMap[m.name] = { id, ...m };

  // 1) 부부 쌍 추출
  const coupleMap = {}; // name → spouseName (배정된 사람 중에서만)
  const inList = new Set(allMembers.map(m => m.name));
  for (const m of allMembers) {
    const full = memMap[m.name] || m;
    if (full.spouseId && !coupleMap[m.name]) {
      const spouseEntry = Object.entries(mems).find(([id]) => id === full.spouseId);
      if (spouseEntry && inList.has(spouseEntry[1].name)) {
        coupleMap[m.name]              = spouseEntry[1].name;
        coupleMap[spouseEntry[1].name] = m.name;
      }
    }
  }

  // 2) 6명으로 채우기 (실제 배정된 인원)
  const pool = allMembers.slice(0, 6);

  // 3) 팀 배분: 부부 우선으로 짝 짓고, 나머지 순서대로
  const paired = new Set();
  const pairs  = []; // [{m0, m1}]

  // 인도자를 먼저 pool 앞으로 정렬 (leader가 항상 팀1에)
  pool.sort((a, b) => {
    if (leader && a.name === leader.name) return -1;
    if (leader && b.name === leader.name) return 1;
    return 0;
  });

  // 부부 쌍을 먼저 짝
  for (const m of pool) {
    if (paired.has(m.name)) continue;
    const spouseName = coupleMap[m.name];
    if (spouseName && inList.has(spouseName) && !paired.has(spouseName)) {
      const spouse = pool.find(x => x.name === spouseName);
      if (spouse) {
        pairs.push([m, spouse]);
        paired.add(m.name);
        paired.add(spouseName);
        continue;
      }
    }
  }
  // 나머지: 동성끼리 짝 (형제+형제, 자매+자매), 불가 시 혼성
  const remain = pool.filter(m => !paired.has(m.name));
  const brothers = remain.filter(m => (memMap[m.name]?.gender || m.gender) === '형제');
  const sisters  = remain.filter(m => (memMap[m.name]?.gender || m.gender) === '자매');

  for (let i = 0; i + 1 < brothers.length; i += 2) pairs.push([brothers[i], brothers[i + 1]]);
  for (let i = 0; i + 1 < sisters.length;  i += 2) pairs.push([sisters[i],  sisters[i + 1]]);

  // 동성 짝 후 남은 홀수 1명씩 혼성 처리
  const leftover = [];
  if (brothers.length % 2 === 1) leftover.push(brothers[brothers.length - 1]);
  if (sisters.length  % 2 === 1) leftover.push(sisters[sisters.length - 1]);
  for (let i = 0; i + 1 < leftover.length; i += 2) pairs.push([leftover[i], leftover[i + 1]]);
  if (leftover.length % 2 === 1) pairs.push([leftover[leftover.length - 1], null]);

  // 인도자가 포함된 쌍을 팀1로
  const leaderPairIdx = leader
    ? pairs.findIndex(p => p[0]?.name === leader.name || p[1]?.name === leader.name)
    : -1;
  if (leaderPairIdx > 0) {
    const [lp] = pairs.splice(leaderPairIdx, 1);
    pairs.unshift(lp);
  }

  // 4) 팀 객체로 변환 (최대 3팀) — 혼성 팀은 언제나 형제 먼저
  return pairs.slice(0, 3).map(pair => {
    const members = pair.filter(Boolean);
    members.sort((a, b) => {
      const ga = memMap[a.name]?.gender || a.gender;
      const gb = memMap[b.name]?.gender || b.gender;
      if (ga === '형제' && gb === '자매') return -1;
      if (ga === '자매' && gb === '형제') return 1;
      return 0;
    });
    return {
      members: members.map(m => ({
        name: m.name,
        gender: m.gender,
        role: leader && m.name === leader.name ? 'leader' : 'member'
      }))
    };
  });
}

function chunkArr(arr, size) {
  const res = [];
  for (let i = 0; i < arr.length; i += size) res.push(arr.slice(i, i + size));
  return res;
}

async function renderStatsTab(ym) {
  const snapS = await db.ref(`submissions/${ym}`).get();
  const subs  = snapS.val() || {};
  // 확정 배정이 있으면 확정 데이터 우선, 없으면 임시 배정 사용
  const snapC  = await db.ref(`confirmedAssignments/${ym}`).get();
  const snapA  = await db.ref(`assignments/${ym}`).get();
  const asgn   = (snapC.exists() ? snapC.val() : snapA.val()) || {};

  const memberList = Object.values(members);

  // confirmedAssignments에서 이름→배정 슬롯 수 추출 (배정표 기준 신청 보완용)
  const confirmedSlotCountByName = {};
  if (snapC.exists()) {
    for (const [, data] of Object.entries(asgn)) {
      if (!data?.teams) continue;
      for (const team of data.teams) {
        for (const x of (team.members || [])) {
          confirmedSlotCountByName[x.name] = (confirmedSlotCountByName[x.name] || 0) + 1;
        }
      }
    }
  }

  // 신청 횟수: submissions 기준이되, 배정표에만 있는 사람은 배정 횟수로 보완
  const subCount = {};
  for (const m of memberList) subCount[m.name] = 0;
  for (const [name, d] of Object.entries(subs)) {
    subCount[name] = d?.slots?.length || 0;
  }
  // submissions에 없지만 confirmedAssignments에 있으면 배정 슬롯 수를 신청 횟수로 반영
  for (const [name, cnt] of Object.entries(confirmedSlotCountByName)) {
    if ((subCount[name] ?? -1) === 0 && cnt > 0) subCount[name] = cnt;
  }

  // 배정 횟수
  const asnCount = {};
  for (const m of memberList) asnCount[m.name] = 0;
  for (const [slotKey, data] of Object.entries(asgn)) {
    if (!data?.teams) continue;
    for (const team of data.teams) {
      for (const x of (team.members || [])) {
        asnCount[x.name] = (asnCount[x.name] || 0) + 1;
      }
    }
  }

  // 인도자 현황
  const leaderCount = {};
  for (const [slotKey, data] of Object.entries(asgn)) {
    if (!data?.teams) continue;
    for (const team of data.teams) {
      for (const x of (team.members || [])) {
        if (x.role === 'leader') {
          leaderCount[x.name] = (leaderCount[x.name] || 0) + 1;
        }
      }
    }
  }

  const zeroSub = memberList.filter(m => (subCount[m.name]||0) === 0);
  const zeroAsn = memberList.filter(m => (asnCount[m.name]||0) === 0);

  const maxSub = Math.max(1, ...Object.values(subCount));
  const maxAsn = Math.max(1, ...Object.values(asnCount));

  const sortedBySub = [...memberList].sort((a,b) => (subCount[b.name]||0)-(subCount[a.name]||0));
  const sortedByAsn = [...memberList].sort((a,b) => (asnCount[b.name]||0)-(asnCount[a.name]||0));
  const leaders = memberList.filter(m => m.gender==='형제' && m.canLead);
  const pioneers = memberList.filter(m => m.isPioneer);

  let html = `
    <div class="result-month-nav">
      <button class="month-nav-btn" onclick="adminChangeMonth(-1)">◀</button>
      <h3>${ymToLabel(ym)} 통계</h3>
      <button class="month-nav-btn" onclick="adminChangeMonth(1)">▶</button>
    </div>
  `;

  // 신청 현황
  html += `<div class="card" style="margin-bottom:14px">
    <div class="card-header">📋 신청 횟수 (많은 순)</div>
    <table class="stat-table"><thead><tr><th>이름</th><th>성별</th><th>신청 횟수</th></tr></thead><tbody>`;
  for (const m of sortedBySub) {
    const cnt = subCount[m.name] || 0;
    const pct = Math.round(cnt/maxSub*100);
    const gc = m.gender==='형제'?'badge-b':'badge-s';
    html += `<tr style="${cnt===0?'opacity:.5':''}">
      <td style="font-weight:700">${m.name}</td>

      <td>${cnt}회<div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div></td>
    </tr>`;
  }
  html += `</tbody></table></div>`;

  // 배정 현황
  html += `<div class="card" style="margin-bottom:14px">
    <div class="card-header">🎯 배정 횟수 (많은 순)</div>
    <table class="stat-table"><thead><tr><th>이름</th><th>성별</th><th>배정 횟수</th></tr></thead><tbody>`;
  for (const m of sortedByAsn) {
    const cnt = asnCount[m.name] || 0;
    const pct = Math.round(cnt/maxAsn*100);
    const gc = m.gender==='형제'?'badge-b':'badge-s';
    html += `<tr style="${cnt===0?'opacity:.5':''}">
      <td style="font-weight:700">${m.name}</td>
      <td><span class="badge ${gc}">${m.gender}</span></td>
      <td>${cnt}회<div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div></td>
    </tr>`;
  }
  html += `</tbody></table></div>`;

  // 미신청/미배정
  html += `<div class="summary-grid" style="grid-template-columns:1fr 1fr;margin-bottom:14px">
    <div class="summary-card">
      <div class="summary-num" style="color:#e53e3e">${zeroSub.length}</div>
      <div class="summary-label">신청 0회</div>
      <div style="font-size:.75em;color:#a0aec0;margin-top:6px">${zeroSub.map(m=>m.name).join(', ')||'없음'}</div>
    </div>
    <div class="summary-card">
      <div class="summary-num" style="color:#e53e3e">${zeroAsn.length}</div>
      <div class="summary-label">배정 0회</div>
      <div style="font-size:.75em;color:#a0aec0;margin-top:6px">${zeroAsn.map(m=>m.name).join(', ')||'없음'}</div>
    </div>
  </div>`;

  // 인도자 로테이션
  html += `<div class="card" style="margin-bottom:14px">
    <div class="card-header">⭐ 인도자 로테이션</div>
    <table class="stat-table"><thead><tr><th>이름</th><th>인도 횟수</th></tr></thead><tbody>`;
  for (const m of leaders) {
    const cnt = leaderCount[m.name] || 0;
    html += `<tr><td style="font-weight:700">${m.name}</td><td>${cnt}회</td></tr>`;
  }
  html += `</tbody></table></div>`;

  document.getElementById('tabStats').innerHTML = html;
  setupAdminAssignListener(ym);
  setupAdminSubsListener(ym);
}

    📋 <b>엑셀 양식 열 순서:</b> 이름 · 성별(형제/자매) · 인도가능(O/X) · 파이오니아(O/X) · 배우자(이름)<br>
    부부는 서로의 이름을 배우자 칸에 입력하면 자동 연결됩니다.

        ${m.isPioneer ? '<span class="badge badge-y">파이오니아</span>' : ''}

// ── 봉사자 추가/수정 모달 ──
function openMemberModal(memberId) {
  editingMemberId = memberId;
  const modal = document.getElementById('memberModal');
  modal.classList.remove('hidden');
  document.getElementById('modalTitle').textContent = memberId ? '봉사자 수정' : '봉사자 추가';

  // 배우자 옵션 채우기
  const spouseSelect = document.getElementById('mSpouse');
  const targetGender = memberId ? (members[memberId]?.gender === '형제' ? '자매' : '형제') : null;
  spouseSelect.innerHTML = '<option value="">없음</option>';
  for (const [id, m] of Object.entries(members)) {
    if (id === memberId) continue;
    if (targetGender && m.gender !== targetGender) continue;
    spouseSelect.innerHTML += `<option value="${id}">${m.name} (${m.gender})</option>`;
  }

  if (memberId && members[memberId]) {
    const m = members[memberId];
    document.getElementById('mName').value = m.name;
    document.querySelector(`input[name=mGender][value="${m.gender}"]`).checked = true;
    modalCanLead = m.canLead || false;
    modalIsPioneer = m.isPioneer || false;
    spouseSelect.value = m.spouseId || '';
  } else {
    document.getElementById('mName').value = '';
    document.querySelector('input[name=mGender][value="형제"]').checked = true;
    modalCanLead = false;
    modalIsPioneer = false;
    spouseSelect.value = '';
  }
  updateToggleUI();
}

function updateToggleUI() {
  document.getElementById('tCanLead').classList.toggle('on', modalCanLead);
  document.getElementById('tCannotLead').classList.toggle('on', !modalCanLead);
  document.getElementById('tIsPioneer').classList.toggle('on', modalIsPioneer);
  document.getElementById('tNotPioneer').classList.toggle('on', !modalIsPioneer);
}

function toggleField(field) {
  if (field === 'canLead') { modalCanLead = true; }
  else if (field === 'cannotLead') { modalCanLead = false; }
  else if (field === 'pioneer') { modalIsPioneer = true; }
  else if (field === 'notPioneer') { modalIsPioneer = false; }
  updateToggleUI();
}

function closeMemberModal() {
  document.getElementById('memberModal').classList.add('hidden');
  editingMemberId = null;
}

function closeMemberModalOutside(e) {
  if (e.target === document.getElementById('memberModal')) closeMemberModal();
}

async function saveMember() {
  const name = document.getElementById('mName').value.trim();
  if (!name) { alert('이름을 입력해주세요.'); return; }
  const gender = document.querySelector('input[name=mGender]:checked').value;
  const spouseId = document.getElementById('mSpouse').value || null;

  const data = { name, gender, canLead: modalCanLead, isPioneer: modalIsPioneer, spouseId };

  const updates = {};
  let targetId = editingMemberId;

  if (!targetId) {
    targetId = db.ref('members').push().key;
  }
  updates[`members/${targetId}`] = data;

  // 이전 배우자 관계 해제
  if (editingMemberId && members[editingMemberId]?.spouseId) {
    const oldSpouseId = members[editingMemberId].spouseId;
    if (oldSpouseId !== spouseId) {
      updates[`members/${oldSpouseId}/spouseId`] = null;
    }
  }

  // 새 배우자 연결
  if (spouseId) {
    // 새 배우자의 기존 배우자 관계 해제
    const newSpouse = members[spouseId];
    if (newSpouse?.spouseId && newSpouse.spouseId !== targetId) {
      updates[`members/${newSpouse.spouseId}/spouseId`] = null;
    }
    updates[`members/${spouseId}/spouseId`] = targetId;
  }

  await db.ref().update(updates);
  await loadMembers();
  closeMemberModal();
  renderMembersTab();
}

async function cleanupOrphanSubmissions() {
  const memberNames = new Set(Object.values(members).map(m => m.name));
  const subSnap = await db.ref('submissions').get();
  const allSubs = subSnap.val() || {};
  const updates = {};
  let count = 0;
  for (const ym of Object.keys(allSubs)) {
    for (const name of Object.keys(allSubs[ym] || {})) {
      if (!memberNames.has(name)) {
        updates[`submissions/${ym}/${name}`] = null;
        count++;
      }
    }
  }
  if (count === 0) { alert('삭제된 계정의 신청 내역이 없습니다.'); return; }
  if (!confirm(`삭제된 계정의 신청 내역 ${count}건을 정리하시겠습니까?`)) return;
  await db.ref().update(updates);
  alert(`${count}건 정리 완료`);
}

async function deleteMember(id, name) {
  if (!confirm(`'${name}'을(를) 삭제하시겠습니까?`)) return;
  const m = members[id];
  const updates = {};
  updates[`members/${id}`] = null;
  updates[`memberPins/${id}`] = null;
  if (m?.spouseId) updates[`members/${m.spouseId}/spouseId`] = null;

  // 해당 멤버의 모든 월 신청 데이터 삭제
  const subSnap = await db.ref('submissions').get();
  const allSubs = subSnap.val() || {};
  for (const ym of Object.keys(allSubs)) {
    if (allSubs[ym] && allSubs[ym][name] !== undefined) updates[`submissions/${ym}/${name}`] = null;
  }

  await db.ref().update(updates);
  await loadMembers();
  renderMembersTab();
}

let excelParsedRows = [];

// 파일창은 반드시 동기 컨텍스트에서 열어야 함 (async 불가)
function triggerExcelImport() {
  const el = document.getElementById('excelFileInput');

}

// XLSX 동적 로드 — 여러 CDN 순차 시도
function ensureXLSX() {
  if (typeof XLSX !== 'undefined') return Promise.resolve();
  const urls = [
    'https://unpkg.com/xlsx@0.20.3/dist/xlsx.full.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
    'https://cdn.jsdelivr.net/npm/xlsx@0.20.3/dist/xlsx.full.min.js'
  ];
  function tryNext(i) {
    if (i >= urls.length) return Promise.reject(new Error('SheetJS를 불러올 수 없습니다 (모든 CDN 실패)'));
    return new Promise((res, rej) => {
      if (typeof XLSX !== 'undefined') { res(); return; }
      const s = document.createElement('script');
      s.src = urls[i];
      s.onload  = () => res();
      s.onerror = () => tryNext(i + 1).then(res, rej);
      document.head.appendChild(s);
    });
  }
  return tryNext(0);
}

function handleExcelFile(e) {
  const file = e.target.files[0];
  if (!file) { alert('파일을 인식하지 못했습니다. 다시 시도해주세요.'); return; }

  ensureXLSX()
    .then(() => {
      const reader = new FileReader();
      reader.onerror = () => alert('파일 읽기 오류가 발생했습니다.');
      reader.onload = function(ev) {
        try {
          const data = new Uint8Array(ev.target.result);
          const wb   = XLSX.read(data, { type: 'array' });
          const ws   = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
          parseAndPreviewExcel(rows);
        } catch(err) {
          console.error('엑셀 파싱 오류:', err);
          alert('파일을 읽을 수 없습니다.\n.xlsx 파일인지 확인해주세요.\n\n오류: ' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    })
    .catch(err => {
      alert('엑셀 라이브러리를 불러오지 못했습니다.\n인터넷 연결을 확인해주세요.\n\n오류: ' + err.message);
    });
}

function parseAndPreviewExcel(rawRows) {
  // 빈 행 제거 후 헤더 찾기
  const nonEmpty = rawRows.filter(r => r.some(c => String(c).trim() !== ''));
  if (nonEmpty.length < 2) { alert('데이터가 부족합니다. (헤더 + 1행 이상 필요)'); return; }

  const headers = nonEmpty[0].map(h => String(h).trim());
  const col = (candidates) => headers.findIndex(h => candidates.includes(h));

  const nameIdx    = col(['이름','name','성명']);
  const genderIdx  = col(['성별','gender']);
  const leadIdx    = col(['인도가능','인도','canLead','리더']);
  const pioneerIdx = col(['파이오니아','파이오','pioneer','선구자']);
  const spouseIdx  = col(['배우자','배우자이름','spouse']);

  if (nameIdx === -1 || genderIdx === -1) {
    alert('엑셀 형식 오류: "이름"과 "성별" 열이 반드시 있어야 합니다.\n양식 다운로드 후 사용해주세요.');
    return;
  }

  const existingNames = new Set(Object.values(members).map(m => m.name));
  const parsed = [];

  for (let i = 1; i < nonEmpty.length; i++) {
    const row = nonEmpty[i];
    const name    = String(row[nameIdx]    ?? '').trim();
    const gender  = String(row[genderIdx]  ?? '').trim();
    const canLead = leadIdx    !== -1 ? toBoolXL(row[leadIdx])    : false;
    const isPioneer = pioneerIdx !== -1 ? toBoolXL(row[pioneerIdx]) : false;
    const spouseName = spouseIdx !== -1 ? String(row[spouseIdx] ?? '').trim() : '';

    if (!name) continue;

    const validGender = gender === '형제' || gender === '자매';
    const isDup = existingNames.has(name);

    parsed.push({ name, gender, canLead, isPioneer, spouseName,
      valid: !!(name && validGender), isDup,
      errMsg: !name ? '이름 없음' : !validGender ? '성별 오류' : '' });
  }

  if (parsed.length === 0) { alert('유효한 데이터 행이 없습니다.'); return; }

  excelParsedRows = parsed;
  showExcelPreview(parsed);
}

function toBoolXL(val) {
  const s = String(val ?? '').trim().toUpperCase();
  return ['O','Y','1','TRUE','예','가능','O'].includes(s);
}

function showExcelPreview(rows) {
  const validRows  = rows.filter(r => r.valid);
  const newRows    = validRows.filter(r => !r.isDup);
  const dupRows    = validRows.filter(r => r.isDup);
  const errRows    = rows.filter(r => !r.valid);

  let html = `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      <span class="badge badge-g">신규 ${newRows.length}명</span>
      ${dupRows.length  ? `<span class="badge badge-y">덮어쓰기 ${dupRows.length}명</span>` : ''}
      ${errRows.length  ? `<span class="badge" style="background:#fff5f5;color:#c53030">오류 제외 ${errRows.length}행</span>` : ''}
    </div>
    <div style="overflow-x:auto;max-height:320px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:10px">
    <table class="excel-preview-tbl">
      <thead><tr>
        <th>이름</th><th>성별</th><th>인도가능</th><th>파이오니아</th><th>배우자</th><th>상태</th>
      </tr></thead>
      <tbody>`;

  for (const r of rows) {
    const rowCls = !r.valid ? 'row-err' : r.isDup ? 'row-dup' : 'row-ok';
    const status = !r.valid
      ? `<span style="color:#e53e3e;font-size:.78em">⚠️ ${r.errMsg}</span>`
      : r.isDup
        ? `<span style="color:#d97706;font-size:.78em">🔄 덮어쓰기</span>`
        : `<span style="color:#38a169;font-size:.78em">✅ 신규</span>`;
    html += `<tr class="${rowCls}">
      <td style="font-weight:700">${r.name||'-'}</td>
      <td>${r.gender||'<span style="color:#e53e3e">?</span>'}</td>
      <td style="text-align:center">${r.canLead   ? '✅' : '-'}</td>
      <td style="text-align:center">${r.isPioneer ? '✅' : '-'}</td>
      <td>${r.spouseName||'-'}</td>
      <td>${status}</td>
    </tr>`;
  }
  html += '</tbody></table></div>';

  if (errRows.length > 0) {
    html += `<div style="background:#fffbeb;border:1px solid #f6e05e;border-radius:8px;padding:10px;margin-top:10px;font-size:.82em;color:#744210">
      ⚠️ 오류 행은 등록에서 제외됩니다. 성별 칸에 <b>형제</b> 또는 <b>자매</b>를 정확히 입력했는지 확인해주세요.
    </div>`;
  }

  document.getElementById('excelPreviewContent').innerHTML = html;
  const btn = document.getElementById('excelConfirmBtn');
  btn.disabled = validRows.length === 0;
  btn.textContent = `${validRows.length}명 등록하기`;
  document.getElementById('excelModal').classList.remove('hidden');
}

function closeExcelModal() {
  document.getElementById('excelModal').classList.add('hidden');
  excelParsedRows = [];
}
function closeExcelModalOutside(e) {
  if (e.target === document.getElementById('excelModal')) closeExcelModal();
}

async function confirmExcelImport() {
  const validRows = excelParsedRows.filter(r => r.valid);
  if (validRows.length === 0) return;

  const btn = document.getElementById('excelConfirmBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 등록 중...';

  // name → id 맵 (기존 + 신규)
  const nameToId = {};
  for (const [id, m] of Object.entries(members)) nameToId[m.name] = id;

  // 신규 멤버 ID 먼저 확보 (배우자 연결에 필요)
  for (const row of validRows) {
    if (!nameToId[row.name]) nameToId[row.name] = db.ref('members').push().key;
  }

  const updates = {};

  // 완전한 객체로 한 번에 upsert (spouseId 포함)
  for (const row of validRows) {
    const id = nameToId[row.name];
    const spouseId = row.spouseName ? (nameToId[row.spouseName] ?? null) : null;
    updates[`members/${id}`] = {
      name: row.name, gender: row.gender,
      canLead: row.canLead, isPioneer: row.isPioneer,
      spouseId
    };
  }

  // 배우자가 기존 멤버(미등록 대상)인 경우 → 별도 경로로만 spouseId 업데이트
  const spouseUpdates = {};
  for (const row of validRows) {
    if (!row.spouseName) continue;
    const spouseId = nameToId[row.spouseName];
    if (!spouseId) continue;
    const spouseBeingImported = validRows.some(r => r.name === row.spouseName);
    if (!spouseBeingImported) {
      spouseUpdates[`members/${spouseId}/spouseId`] = nameToId[row.name];
    }
  }

  try {
    await db.ref().update(updates);
    if (Object.keys(spouseUpdates).length > 0) await db.ref().update(spouseUpdates);
    await loadMembers();
    closeExcelModal();
    renderMembersTab();
    alert(`✅ ${validRows.length}명이 등록되었습니다.`);
  } catch(e) {
    console.error('등록 오류:', e);
    btn.disabled = false;
    btn.textContent = `${validRows.length}명 등록하기`;
    alert('❌ 등록 실패\n\n오류: ' + e.message);
  }
}

function downloadExcelTemplate() {
  if (typeof XLSX === 'undefined') {
    // XLSX 없으면 CSV로 대체 다운로드
    const csv = '\uFEFF이름,성별,인도가능,파이오니아,배우자\n홍길동,형제,O,X,홍길순\n홍길순,자매,X,O,홍길동\n김봉사,형제,X,O,\n이자매,자매,X,O,';
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '봉사자_등록양식.csv';
    a.click();
    URL.revokeObjectURL(a.href);
    return;
  }
  const ws = XLSX.utils.aoa_to_sheet([
    ['이름', '성별', '인도가능', '파이오니아', '배우자'],
    ['홍길동', '형제', 'O', 'X', '홍길순'],
    ['홍길순', '자매', 'X', 'O', '홍길동'],
    ['김봉사', '형제', 'X', 'X', ''],
    ['이자매', '자매', 'X', 'O', ''],
  ]);
  // 열 너비 설정
  ws['!cols'] = [{wch:12},{wch:8},{wch:10},{wch:12},{wch:12}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '봉사자');
  XLSX.writeFile(wb, '봉사자_등록양식.xlsx');
}

// ──────────────────────────────────────────────
//  데이터 리셋 (관리자 전용 — 브라우저 콘솔에서 호출)
//  예: resetMonthData('2026-03')
// ──────────────────────────────────────────────
async function resetMonthData(ym) {
  if (!isAdmin) { alert('관리자로 로그인 후 실행하세요.'); return; }
  if (!confirm(`⚠️ ${ymToLabel(ym)}의 신청현황과 배정 데이터를 모두 삭제합니다.\n되돌릴 수 없습니다. 계속하시겠습니까?`)) return;
  await db.ref().update({
    [`submissions/${ym}`]: null,
    [`assignments/${ym}`]: null,
    [`confirmedAssignments/${ym}`]: null,
    [`rotation/${ym}`]: null,
  });
  alert(`${ymToLabel(ym)} 데이터가 초기화되었습니다.`);
  if (currentAdminTab) await adminTab(currentAdminTab, null);
}

// ──────────────────────────────────────────────
//  앱 시작
// ──────────────────────────────────────────────
init();
</script>
