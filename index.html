<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>전시대 봉사 신청</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗓️</text></svg>">

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<!-- SheetJS (Excel 파싱) — 여러 CDN 순차 시도 -->
<script>
(function(){
  var urls = [
    'https://unpkg.com/xlsx@0.20.3/dist/xlsx.full.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
    'https://cdn.jsdelivr.net/npm/xlsx@0.20.3/dist/xlsx.full.min.js'
  ];
  function tryLoad(i) {
    if (i >= urls.length) return;
    var s = document.createElement('script');
    s.src = urls[i];
    s.onerror = function() { tryLoad(i + 1); };
    document.head.appendChild(s);
  }
  tryLoad(0);
})();
</script>

<style>
/* ── 기본 리셋 & 모바일 기반 ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,'Apple SD Gothic Neo','맑은 고딕','Malgun Gothic',sans-serif;
  background:#f0f2f5;color:#2d3748;
  font-size:16px; /* iOS 줌 방지 (16px 미만이면 입력 시 자동 줌됨) */
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── 공통 ── */
.hidden{display:none!important}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 18px;border:none;border-radius:12px;cursor:pointer;
  font-size:.9em;font-weight:700;transition:background .15s,transform .1s;
  white-space:nowrap;touch-action:manipulation;
  min-height:44px; /* iOS 최소 터치 타깃 */
}
.btn:active{transform:scale(.95)}
.btn-primary{background:#5a67d8;color:#fff}
.btn-primary:active{background:#4c51bf}
.btn-success{background:#38a169;color:#fff}
.btn-success:active{background:#2f855a}
.btn-danger{background:#e53e3e;color:#fff}
.btn-gray{background:#e2e8f0;color:#4a5568}
.btn-gray:active{background:#cbd5e0}
.btn-orange{background:#ed8936;color:#fff}

/* 입력 필드 — font-size 16px로 iOS 줌 완전 방지 */
input[type=text],input[type=password],select{
  width:100%;padding:13px 14px;
  border:1.5px solid #e2e8f0;border-radius:12px;
  font-size:16px;outline:none;
  transition:border .18s;background:#fff;
  -webkit-appearance:none;appearance:none;
}
input:focus,select:focus{border-color:#5a67d8;box-shadow:0 0 0 3px rgba(90,103,216,.12)}

.card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);overflow:hidden}
.card-header{padding:13px 16px;font-weight:700;font-size:.95em;color:#4a5568;border-bottom:1.5px solid #edf2f7;background:#f8fafc;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:.75em;font-weight:700}
.badge-b{background:#ebf8ff;color:#2b6cb0}
.badge-s{background:#fff5f7;color:#c53030}
.badge-g{background:#f0fff4;color:#276749}
.badge-y{background:#fffbeb;color:#744210}

/* ── 로딩 ── */
#loadingScreen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.spinner{width:44px;height:44px;border:4px solid #e9ecef;border-top-color:#5a67d8;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 로그인 화면 ── */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));
}
.login-box{width:100%;max-width:400px}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo h1{font-size:1.7em;font-weight:800;color:#5a67d8;letter-spacing:-.5px}
.login-logo p{font-size:.88em;color:#a0aec0;margin-top:5px}
.login-card{background:#fff;border-radius:22px;padding:28px 22px;box-shadow:0 8px 32px rgba(90,103,216,.15)}
.login-card h2{font-size:1em;font-weight:700;margin-bottom:16px;color:#2d3748}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.8em;font-weight:700;color:#718096;margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase}
.error-msg{color:#e53e3e;font-size:.83em;margin-top:8px;padding:10px 13px;background:#fff5f5;border-radius:10px;border:1px solid #fed7d7;display:none;line-height:1.5}
.error-msg.show{display:block}
.login-divider{text-align:center;margin:18px 0;color:#a0aec0;font-size:.8em;position:relative}
.login-divider::before,.login-divider::after{content:'';position:absolute;top:50%;width:36%;height:1px;background:#e2e8f0}
.login-divider::before{left:0}.login-divider::after{right:0}

/* ── 봉사자 헤더 ── */
#volunteerScreen{min-height:100vh;padding-bottom:calc(74px + env(safe-area-inset-bottom))}
.vol-header{
  background:linear-gradient(135deg,#5a67d8,#7c3aed);color:#fff;
  padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.vol-header h1{font-size:1.05em;font-weight:800}
.vol-header .user-name{font-size:.82em;opacity:.9;margin-top:2px}
.vol-content{padding:10px;max-width:600px;margin:0 auto}
.month-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;background:#fff;border-radius:14px;
  padding:10px 14px;box-shadow:0 1px 6px rgba(0,0,0,.06);
}
.month-nav h2{font-size:1em;font-weight:800;color:#2d3748}
.month-nav-btn{
  background:none;border:none;font-size:1.4em;cursor:pointer;
  color:#5a67d8;padding:6px 10px;border-radius:10px;
  min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;
}
.month-nav-btn:active{background:#ebf4ff}

/* 신청 완료 배너 */
.submit-success{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;background:#f0fff4;
  border-radius:14px;margin-bottom:10px;
  border:1.5px solid #9ae6b4;
}
.submit-success-icon{font-size:1.5em;flex-shrink:0}
.submit-success-text strong{display:block;font-size:.92em;color:#276749}
.submit-success-text span{font-size:.8em;color:#48bb78}

/* ── 달력 ── */
.cal-wrap{background:#fff;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.07);overflow:hidden;margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{
  text-align:center;font-size:.72em;font-weight:800;
  padding:9px 2px;background:#f8fafc;color:#718096;
  border-bottom:1px solid #edf2f7;
}
.cal-dow:first-child{color:#e53e3e}
.cal-dow:last-child{color:#3182ce}
.cal-cell{
  border-top:1px solid #f0f4f8;border-right:1px solid #f0f4f8;
  padding:5px 3px 4px;
  display:flex;flex-direction:column;gap:3px;
  min-height:62px;
}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.empty{background:#fafafa}
.cal-date{
  font-size:.75em;font-weight:700;text-align:center;
  width:24px;height:24px;line-height:24px;border-radius:50%;
  margin:0 auto 1px;flex-shrink:0;color:#2d3748;
}
.cal-cell.sun .cal-date{color:#e53e3e}
.cal-cell.sat .cal-date{color:#3182ce}
.cal-cell.today .cal-date{background:#5a67d8;color:#fff}
.cal-cell.other-month .cal-date{color:#cbd5e0}

/* 슬롯 칩 — 충분한 터치 타깃 */
.cal-slot-chip{
  font-size:.68em;font-weight:700;
  border-radius:5px;padding:3px 2px;
  cursor:pointer;text-align:center;line-height:1.4;
  border:1.5px solid transparent;
  transition:transform .1s,filter .1s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  user-select:none;touch-action:manipulation;
  min-height:22px;display:flex;align-items:center;justify-content:center;
}
.cal-slot-chip.on{
  filter:brightness(.82);border-color:rgba(0,0,0,.18);
  box-shadow:inset 0 1px 3px rgba(0,0,0,.12);
}
.cal-slot-chip:active{transform:scale(.88)}

/* 선택 내역 패널 */
.selected-panel{background:#fff;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);padding:14px;margin-bottom:10px}
.selected-panel-title{font-size:.8em;font-weight:700;color:#718096;margin-bottom:10px;text-transform:uppercase;letter-spacing:.3px}
.selected-chips{display:flex;flex-wrap:wrap;gap:6px}
.selected-chip{
  display:inline-flex;align-items:center;gap:5px;
  border-radius:99px;padding:6px 12px;
  font-size:.8em;font-weight:700;
  border:1.5px solid transparent;
}
.selected-chip .chip-remove{
  background:none;border:none;cursor:pointer;
  font-size:.85em;line-height:1;padding:0;
  opacity:.6;touch-action:manipulation;
  min-width:20px;min-height:20px;
  display:flex;align-items:center;justify-content:center;
}
.selected-empty{text-align:center;color:#a0aec0;font-size:.88em;padding:8px}

/* 하단 제출 바 */
.submit-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;
  padding:10px 14px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  box-shadow:0 -2px 16px rgba(0,0,0,.10);
  display:flex;gap:10px;z-index:100;
}
.submit-bar .btn{flex:1;padding:14px;font-size:.95em;border-radius:14px}

/* ── 관리자 화면 ── */
#adminScreen{min-height:100vh;padding-bottom:20px}
.admin-sticky-wrap{position:-webkit-sticky;position:sticky;top:0;z-index:100}
.admin-header{
  background:linear-gradient(135deg,#2d3748,#4a5568);color:#fff;
  padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;
}
.admin-header h1{font-size:1em;font-weight:800}
.admin-tabs{
  display:flex;background:#fff;border-bottom:2px solid #e2e8f0;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.admin-tabs::-webkit-scrollbar{display:none}
.tab-btn{
  flex:1;min-width:72px;padding:13px 10px;
  font-weight:700;font-size:.8em;color:#718096;
  border:none;background:none;cursor:pointer;
  border-bottom:2.5px solid transparent;margin-bottom:-2px;
  white-space:nowrap;transition:color .15s,border-color .15s;
  touch-action:manipulation;
}
.tab-btn.active{color:#5a67d8;border-bottom-color:#5a67d8}
.admin-content{padding:12px;max-width:900px;margin:0 auto}

/* ── 신청 현황 탭 ── */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.summary-card{background:#fff;border-radius:14px;padding:16px 12px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.summary-num{font-size:2em;font-weight:800;color:#5a67d8;line-height:1}
.summary-label{font-size:.75em;color:#a0aec0;margin-top:4px}
.slot-status-item{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.slot-status-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.slot-status-title{font-weight:700;font-size:.92em;display:flex;align-items:center;gap:8px}
.slot-members{display:flex;flex-wrap:wrap;gap:6px}
.member-chip{padding:5px 11px;border-radius:99px;font-size:.8em;font-weight:600}
.member-chip-b{background:#ebf8ff;color:#2b6cb0}
.member-chip-s{background:#fff5f7;color:#c53030}
.not-submitted-list{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-top:14px}

/* ── 배정 탭 ── */
.assign-slot-card{margin-bottom:12px}
.assign-slot-card .card-header{justify-content:space-between}
.team-block{padding:12px 14px;border-bottom:1px solid #f0f4f8}
.team-block:last-child{border-bottom:none}
.team-label{font-size:.75em;font-weight:700;color:#a0aec0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.team-members{display:flex;flex-wrap:wrap;gap:6px}
.leader-chip{background:#fffbeb;color:#92400e;border:1.5px solid #f6d860;padding:5px 11px;border-radius:99px;font-size:.8em;font-weight:700}
.unassigned-section{background:#fff5f5;border:1.5px dashed #fc8181;border-radius:12px;padding:14px;margin-top:12px}

/* ── 통계 탭 ── */
.stat-table{width:100%;border-collapse:collapse}
.stat-table th,.stat-table td{padding:10px 12px;text-align:left;border-bottom:1px solid #f0f4f8;font-size:.85em}
.stat-table th{background:#f8fafc;font-weight:700;color:#4a5568;font-size:.78em;text-transform:uppercase;letter-spacing:.4px}
.stat-table tr:last-child td{border-bottom:none}
.bar-wrap{background:#edf2f7;border-radius:99px;height:6px;width:50px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#667eea,#764ba2)}

/* ── 엑셀 미리보기 ── */
.excel-preview-tbl{width:100%;border-collapse:collapse;font-size:.8em}
.excel-preview-tbl th{background:#f8fafc;padding:8px 10px;text-align:left;border-bottom:2px solid #e2e8f0;font-weight:700;color:#4a5568;white-space:nowrap}
.excel-preview-tbl td{padding:8px 10px;border-bottom:1px solid #f0f4f8;vertical-align:middle}
.row-ok td:first-child{border-left:3px solid #38a169}
.row-dup td:first-child{border-left:3px solid #d97706}
.row-err td:first-child{border-left:3px solid #e53e3e}
.row-err{background:#fff5f5}

/* ── 봉사자 관리 탭 ── */
.member-row{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid #f0f4f8;flex-wrap:wrap}
.member-row:last-child{border-bottom:none}
.member-name{font-weight:700;min-width:60px;flex-shrink:0;font-size:.95em}
.member-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.member-actions{display:flex;gap:6px;flex-shrink:0}
.member-actions button{
  padding:7px 12px;font-size:.8em;border-radius:8px;
  border:none;cursor:pointer;font-weight:700;
  min-height:36px;touch-action:manipulation;
}
.edit-btn{background:#ebf4ff;color:#2b6cb0}
.del-btn{background:#fff5f5;color:#c53030}

/* ── 모달 ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:flex-end;justify-content:center;z-index:1000;
}
.modal-box{
  background:#fff;border-radius:22px 22px 0 0;
  padding:22px 18px;
  padding-bottom:calc(22px + env(safe-area-inset-bottom));
  width:100%;max-width:520px;max-height:92vh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.modal-handle{width:40px;height:4px;background:#e2e8f0;border-radius:99px;margin:0 auto 18px}
.modal-title{font-size:1.05em;font-weight:800;margin-bottom:18px;color:#2d3748}
.form-row{margin-bottom:16px}
.form-row label{display:block;font-size:.78em;font-weight:700;color:#718096;margin-bottom:7px;text-transform:uppercase;letter-spacing:.3px}
.radio-group{display:flex;gap:8px}
.radio-group label{
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:.9em;font-weight:700;cursor:pointer;flex:1;
  background:#f7fafc;padding:11px 10px;border-radius:11px;
  border:2px solid transparent;transition:all .15s;
  min-height:44px;touch-action:manipulation;
}
.radio-group input[type=radio]{display:none}
.radio-group input[type=radio]:checked+span{color:#5a67d8}
.radio-group label:has(input:checked){border-color:#5a67d8;background:#ebf4ff}
.toggle-group{display:flex;gap:8px}
.toggle-item{
  flex:1;background:#f7fafc;border:2px solid transparent;border-radius:11px;
  padding:11px 10px;text-align:center;cursor:pointer;
  font-size:.88em;font-weight:700;transition:all .15s;
  min-height:44px;display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;
}
.toggle-item.on{border-color:#38a169;background:#f0fff4;color:#276749}

/* ── 반응형 ── */
@media(min-width:600px){
  .summary-grid{grid-template-columns:repeat(4,1fr)}
  .modal-overlay{align-items:center}
  .modal-box{border-radius:22px;max-width:480px;padding-bottom:22px}
  .tab-btn{flex:0 0 auto;padding:13px 18px}
  .vol-content{padding:16px}
  .admin-content{padding:16px}
}
@media(max-width:375px){
  body{font-size:15px}
  .cal-cell{min-height:56px}
  .cal-slot-chip{font-size:.62em;padding:2px 1px}
  .tab-btn{font-size:.75em;padding:12px 8px}
  .admin-content{padding:10px}
}

/* ── 배정 결과 달력 ── */
.result-month-nav{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:14px;padding:10px 14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.result-month-nav h3{font-size:1em;font-weight:800;color:#2d3748}
.result-date-section{margin-bottom:14px}
.result-date-header{font-size:.82em;font-weight:800;color:#fff;background:linear-gradient(135deg,#5a67d8,#7c3aed);border-radius:10px;padding:8px 14px;margin-bottom:8px;letter-spacing:-.3px}
.result-slot-block{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.result-slot-title{font-size:.78em;font-weight:800;padding:8px 14px;border-bottom:1px solid #f0f4f8;display:flex;align-items:center;justify-content:space-between}
.result-team-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:7px 12px;border-bottom:1px solid #f8fafc}
.result-team-row:last-child{border-bottom:none}
.result-name-chip{font-size:.88em;font-weight:700;padding:7px 10px;border-radius:9px;background:#f7fafc;color:#2d3748;text-align:center;min-height:36px;display:flex;align-items:center;justify-content:center;cursor:default;transition:background .15s}
.result-name-chip.leader{background:#fffbeb;color:#92400e;border:1.5px solid #f6d860}
.result-name-chip.editable{cursor:pointer;border:1.5px dashed #cbd5e0}
.result-name-chip.editable:active{background:#ebf4ff}
.result-name-chip.empty{color:#cbd5e0;background:#fafafa;font-style:italic;font-weight:400;font-size:.8em}
.result-action-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.result-action-bar .btn{font-size:.85em;padding:10px 14px}
.confirmed-badge{background:#f0fff4;border:1.5px solid #9ae6b4;border-radius:10px;padding:8px 14px;font-size:.82em;font-weight:700;color:#276749;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* 이름 선택 모달 */
.name-picker-list{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;max-height:300px;overflow-y:auto}
.name-picker-item{padding:11px 10px;border-radius:10px;background:#f7fafc;font-size:.88em;font-weight:700;cursor:pointer;text-align:center;border:2px solid transparent;touch-action:manipulation}
.name-picker-item:active{background:#ebf4ff;border-color:#5a67d8}
.name-picker-item.brother{color:#2b6cb0}
.name-picker-item.sister{color:#c53030}

/* ── 배정 결과 월간 달력 그리드 ── */
.result-cal-outer{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:12px}
/* 5열 그리드 (일/목 제외: 월화수금토만 표시) */
.result-cal-grid-5{display:grid;grid-template-columns:repeat(5,1fr)}
.result-cal-dow{text-align:center;font-size:.82em;font-weight:800;padding:9px 2px;background:#f8fafc;border-bottom:1.5px solid #edf2f7;color:#718096}
.result-cal-dow.sat{color:#3182ce}

// ──────────────────────────────────────────────

// 현재 비밀번호: 1234 → 변경 시 브라우저 콘솔에서 hashPw('새비밀번호') 실행 후 아래 해시값 교체

async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}

async function init() {
  show('loadingScreen');
  try {
    await firebase.auth().signInAnonymously();
    await Promise.race([
      loadMembers(),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000))
    ]);
  } catch(e) {
    console.error('Firebase 연결 오류:', e);
    document.getElementById('loginError').textContent =
      'Firebase 연결에 실패했습니다.\n데이터베이스 규칙을 확인해주세요.';
    document.getElementById('loginError').classList.add('show');
  }

  // 세션 복원 (새로고침 시 로그인 유지)
  const savedAdmin = sessionStorage.getItem('adminSession');
  const savedUser  = sessionStorage.getItem('volUser');
  if (savedAdmin === '1') {
    isAdmin = true;
    hide('loadingScreen');
    await enterAdminScreen();
    return;
  } else if (savedUser) {
    const mem = Object.values(members).find(m => m.name === savedUser);
    if (mem) {
      currentUser = mem;
      hide('loadingScreen');
      await enterVolunteerScreen();
      return;
    }
  }

  hide('loadingScreen');
  showLogin();
}

async function loadMembers() {
  const snap = await db.ref('members').get();
  members = snap.val() || {};
  if (Object.keys(members).length === 0) {
    await seedMembers();
    const snap2 = await db.ref('members').get();
    members = snap2.val() || {};
  }
}

    {name:'임지혜',gender:'자매',canLead:false,isPioneer:true, spouseId:null},
    {name:'정지희',gender:'자매',canLead:false,isPioneer:false,spouseId:null},
    {name:'박선민',gender:'자매',canLead:false,isPioneer:true, spouseId:null},
    {name:'송세현',gender:'자매',canLead:false,isPioneer:false,spouseId:null},
  ];
  const updates = {};
  const ids = [];
  for (const m of sample) {
    const id = db.ref('members').push().key;
    updates[`members/${id}`] = m;
    ids.push({id, ...m});
  }
  // 부부 연결: 김광섭↔김충경, 박성민↔양정옥, 이규원↔임지혜
  const find = (name) => ids.find(x => x.name === name);
  const couples = [['김광섭','김충경'],['박성민','양정옥'],['이규원','임지혜']];
  for (const [a, b] of couples) {
    const ma = find(a), mb = find(b);
    if (ma && mb) {
      updates[`members/${ma.id}/spouseId`] = mb.id;
      updates[`members/${mb.id}/spouseId`] = ma.id;
    }
  }
  await db.ref().update(updates);
}

function findMemberByName(name) {
  const nm = name.trim();
  return Object.entries(members).find(([,m]) => m.name === nm) || null;
}

let loginPendingMember = null;

async function loginVolunteer() {
  const name = document.getElementById('loginName').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.classList.remove('show');
  if (!name) { showError('이름을 입력해주세요.'); return; }
  const found = findMemberByName(name);
  if (!found) { showError('등록되지 않은 봉사자입니다.\n관리자에게 문의하세요.'); return; }
  loginPendingMember = { id: found[0], ...found[1] };

  const pinSnap = await db.ref(`memberPins/${found[0]}`).get();
  if (pinSnap.exists()) {
    // 기존 PIN 입력 단계
    document.getElementById('loginPinName').textContent = name + '님';
    document.getElementById('loginPinInput').value = '';
    document.getElementById('pinError').classList.remove('show');
    hide('loginStepName');
    show('loginStepPin');
    setTimeout(() => document.getElementById('loginPinInput').focus(), 100);
  } else {
    // 최초 PIN 설정 단계
    document.getElementById('loginSetPinName').textContent = name + '님';
    document.getElementById('loginNewPin').value = '';
    document.getElementById('loginConfirmPin').value = '';
    document.getElementById('setPinError').classList.remove('show');
    hide('loginStepName');
    show('loginStepSetPin');
    setTimeout(() => document.getElementById('loginNewPin').focus(), 100);
  }
}

async function submitPinLogin() {
  const pin = document.getElementById('loginPinInput').value.trim();
  const errEl = document.getElementById('pinError');
  errEl.classList.remove('show');
  if (!/^\d{4}$/.test(pin)) {
    errEl.textContent = '숫자 4자리를 입력해주세요.'; errEl.classList.add('show'); return;
  }
  const pinSnap = await db.ref(`memberPins/${loginPendingMember.id}`).get();
  const inputHash = await hashPw(pin);
  if (inputHash !== pinSnap.val()) {
    errEl.textContent = '비밀번호가 올바르지 않습니다.'; errEl.classList.add('show'); return;
  }
  finishVolLogin();
}

async function submitSetPin() {
  const newPin = document.getElementById('loginNewPin').value.trim();
  const confirmPin = document.getElementById('loginConfirmPin').value.trim();
  const errEl = document.getElementById('setPinError');
  errEl.classList.remove('show');
  if (!/^\d{4}$/.test(newPin)) {
    errEl.textContent = '숫자 4자리를 입력해주세요.'; errEl.classList.add('show'); return;
  }
  if (newPin !== confirmPin) {
    errEl.textContent = '비밀번호가 일치하지 않습니다.'; errEl.classList.add('show'); return;
  }
  const hash = await hashPw(newPin);
  await db.ref(`memberPins/${loginPendingMember.id}`).set(hash);
  finishVolLogin();
}

async function finishVolLogin() {
  currentUser = loginPendingMember;
  loginPendingMember = null;
  isAdmin = false;
  sessionStorage.setItem('volUser', currentUser.name);
  hide('loginScreen');
  await enterVolunteerScreen();
}

function backToNameStep() {

async function resetMemberPin(id, name) {

function showError(msg) {

  el.classList.add('show');
}

async function loginAdmin() {
  // 잠금 여부 확인
  if (Date.now() < adminLockUntil) {
    const mins = Math.ceil((adminLockUntil - Date.now()) / 60000);
    showError(`로그인 시도 횟수를 초과했습니다. ${mins}분 후 다시 시도해주세요.`);
    return;
  }
  const pw = document.getElementById('adminPw').value;
  const hash = await hashPw(pw);
  if (hash !== ADMIN_PW_HASH) {
    adminFailCount++;
    if (adminFailCount >= 5) {
      adminLockUntil = Date.now() + 30 * 60 * 1000; // 30분 잠금
      adminFailCount = 0;
      showError('비밀번호를 5회 틀렸습니다. 30분간 잠금됩니다.');
    } else {
      showError(`비밀번호가 올바르지 않습니다. (${adminFailCount}/5)`);
    }
    return;
  }
  adminFailCount = 0;
  isAdmin = true;
  currentUser = null;
  sessionStorage.setItem('adminSession', '1');
  hide('loginScreen');
  await enterAdminScreen();
}

let volDisplayMonth = 1; // 1 = 다음달 기본
const VOL_MIN_OFFSET = 0; // 0 = 이번 달
const VOL_MAX_OFFSET = 1;

async function enterVolunteerScreen() {
  show('volunteerScreen');
  document.getElementById('volUserName').textContent = currentUser.name + '님';
  volDisplayMonth = 0; // 기본: 이번 달 (확정 계획표)
  await volLoadAndRender();
}

async function volChangeMonth(dir) {
  const next = volDisplayMonth + dir;
  if (next < VOL_MIN_OFFSET || next > VOL_MAX_OFFSET) return;
  volDisplayMonth = next;
  await volLoadAndRender();
}

async function volLoadAndRender() {
  const ym = getOffsetYM(volDisplayMonth);
  currentYM = ym;
  document.getElementById('volPrevBtn').disabled = volDisplayMonth <= VOL_MIN_OFFSET;
  document.getElementById('volNextBtn').disabled = volDisplayMonth >= VOL_MAX_OFFSET;
  document.getElementById('volMonthTitle').textContent = ymToLabel(ym);

  const snapC = await db.ref(`confirmedAssignments/${ym}`).get();
  const confirmed = snapC.exists() ? snapC.val() : null;

  if (confirmed) {
    // 확정된 계획표 보기
    hide('volSubmitSuccess');
    hide('volSubmitBar');
    document.getElementById('volSlotsContainer').innerHTML = renderConfirmedScheduleForVol(ym, confirmed);
  } else {
    // 미확정 → 신청 가능 (이번 달 / 다음 달 모두)
    show('volSubmitBar');
    const snap = await db.ref(`submissions/${ym}/${currentUser.name}`).get();
    const myData = snap.val();
    volSelectedSlots = new Set(myData ? (myData.slots || []) : []);
    if (myData) {
      show('volSubmitSuccess');
      document.getElementById('volSubmitBtn').textContent = '수정 완료';
    } else {
      hide('volSubmitSuccess');
      document.getElementById('volSubmitBtn').textContent = '신청 완료';
    }
    renderVolSlots(ym);
    setupSubmissionsListener(ym);
  }

  setupConfirmedListener(ym);
}

function setupConfirmedListener(ym) {
  if (confirmedListenerYM === ym) return; // 이미 이 달 리스닝 중
  if (confirmedListenerRef && confirmedListenerCb) {
    confirmedListenerRef.off('value', confirmedListenerCb);
  }
  let initialSkip = true;
  confirmedListenerCb = () => {
    if (initialSkip) { initialSkip = false; return; }
    // 확정 데이터 변경 시 자동 리렌더
    if (!isAdmin && currentUser &&
        !document.getElementById('volunteerScreen').classList.contains('hidden')) {
      volLoadAndRender();
    }
  };
  confirmedListenerRef = db.ref(`confirmedAssignments/${ym}`);
  confirmedListenerRef.on('value', confirmedListenerCb);
  confirmedListenerYM = ym;
}

function setupSubmissionsListener(ym) {
  if (submissionsListenerYM === ym) return;
  if (submissionsListenerRef && submissionsListenerCb) {
    submissionsListenerRef.off('value', submissionsListenerCb);
  }
  let initialSkip = true;
  submissionsListenerCb = () => {
    if (initialSkip) { initialSkip = false; return; }
    if (!isAdmin && currentUser &&
        !document.getElementById('volunteerScreen').classList.contains('hidden')) {
      submissionsListenerYM = null; // 강제 재설정
      volLoadAndRender();
    }
  };
  submissionsListenerRef = db.ref(`submissions/${ym}/${currentUser.name}`);
  submissionsListenerRef.on('value', submissionsListenerCb);
  submissionsListenerYM = ym;
}

// ── 확정 계획표 봉사자 뷰 ──
function renderConfirmedScheduleForVol(ym, asgn) {
  const allKeys = Object.keys(asgn).filter(k => asgn[k]);
  if (allKeys.length === 0)
    return `<div style="text-align:center;padding:40px;background:#fff;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.07)"><div style="font-size:2em;margin-bottom:12px">📋</div><div style="font-weight:800;color:#2d3748">배정 내역이 없습니다.</div></div>`;

  const [y, m] = ym.split('-').map(Number);
  function ds2(y2,m2,d2){ return `${y2}-${String(m2).padStart(2,'0')}-${String(d2).padStart(2,'0')}`; }
  function addD(ds, n){ const [yy,mm,dd]=ds.split('-').map(Number); const dt=new Date(yy,mm-1,dd+n); return ds2(dt.getFullYear(),dt.getMonth()+1,dt.getDate()); }
  function getMon(ds){ const [yy,mm,dd]=ds.split('-').map(Number); const dow=new Date(yy,mm-1,dd).getDay(); return addD(ds, dow===0?-6:1-dow); }

  const monthFirst = ds2(y,m,1);
  const monthLast  = ds2(y,m,new Date(y,m,0).getDate());
  const firstMon   = getMon(monthFirst);
  const weekSet = new Set(allKeys.map(sk => getMon(sk.split('__')[1])));
  const sortedWeeks = [...weekSet].sort();

  const FIXED_COLS = [
    {id:'mon-eve',   off:0, label:'월 저녁'},
    {id:'tue-eve',   off:1, label:'화 저녁'},
    {id:'wed-eve',   off:2, label:'수 저녁'},
    {id:'fri-dawn',  off:4, label:'금 새벽'},
    {id:'fri-eve',   off:4, label:'금 저녁'},
    {id:'sat-aft-1', off:5, label:'토 오후<br>1공구'},
    {id:'sat-aft-8', off:5, label:'토 오후<br>8공구'},
  ];

  let html = `<div class="confirmed-badge">📌 배정이 확정되었습니다.</div>
<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:10px 16px;font-size:.82em;color:#166534;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;line-height:1.7">
  <span style="flex-shrink:0;font-size:1.1em">ℹ️</span>
  <span>배정된 타임을 취소하거나 빈자리에 신청할 수 있습니다. 변경 사항은 즉시 반영됩니다.</span>
</div>`;

  for (const monStr of sortedWeeks) {
    const colDates = FIXED_COLS.map(col => addD(monStr, col.off));
    const inMonthDates = colDates.filter(ds => ds >= monthFirst && ds <= monthLast);
    if (inMonthDates.length === 0) continue;
    const weekNum = Math.round((new Date(monStr) - new Date(firstMon)) / (7*86400000)) + 1;
    const [,rfm,rfd] = inMonthDates[0].split('-').map(Number);
    const [,rlm,rld] = inMonthDates[inMonthDates.length-1].split('-').map(Number);
    const maxTeams = Math.max(3, ...FIXED_COLS.map((col,ci) => {
      const sk = `${col.id}__${colDates[ci]}`;
      return asgn[sk]?.teams?.length || 0;
    }));

    html += `<div class="result-week-section">
      <div class="result-week-title">📅 ${weekNum}주차 (${rfm}/${rfd}~${rlm}/${rld})</div>
      <div class="result-table-wrap"><table class="result-table"><thead><tr>`;
    html += '<th class="result-th-team">팀</th>';

    FIXED_COLS.forEach((col,ci) => {
      const ds = colDates[ci];
      const inMonth = ds >= monthFirst && ds <= monthLast;
      const slotDef = ASSIGN_SLOTS.find(s => s.id === col.id);
      const color = inMonth ? (SLOT_COLORS[slotDef?.label] || '#e2e8f0') : '#f0f2f5';
      const [,mo,dd] = ds.split('-').map(Number);
      const sk = `${col.id}__${ds}`;
      const total = inMonth ? (asgn[sk]?.teams?.reduce((s,t) => s+(t.members?.length||0), 0) || 0) : MAX_PER_SLOT;
      html += `<th class="result-th-slot" style="background:${color}${inMonth?'':';opacity:.35'}">
        <div class="result-th-label">${col.label}</div>
        <div class="result-th-date">${inMonth ? `${mo}/${dd}` : '-'}</div>
        ${inMonth && total < MAX_PER_SLOT ? `<div style="font-size:.7em;color:#e53e3e;font-weight:700;margin-top:2px">빈자리 ${MAX_PER_SLOT-total}</div>` : ''}
      </th>`;
    });
    html += '</tr></thead><tbody>';

    for (let ti = 0; ti < maxTeams; ti++) {
      html += `<tr><td class="result-td-team">${ti+1}팀</td>`;
      FIXED_COLS.forEach((col,ci) => {
        const ds = colDates[ci];
        const inMonth = ds >= monthFirst && ds <= monthLast;
        const sk = `${col.id}__${ds}`;
        const slotDef = ASSIGN_SLOTS.find(s => s.id === col.id);
        const color = SLOT_COLORS[slotDef?.label] || '#e2e8f0';
        if (!inMonth) { html += '<td class="result-td-slot" style="background:#f0f2f5;opacity:.35"></td>'; return; }
        const team = asgn[sk]?.teams?.[ti];
        const m0 = team?.members?.[0], m1 = team?.members?.[1];
        html += `<td class="result-td-slot" style="background:${color}22">`;
        if (m0) html += `<div class="result-name-row${m0.role==='leader'?' leader':''}">${m0.role==='leader'?'★':''}${m0.name}</div>`;
        if (m1) html += `<div class="result-name-row${m1.role==='leader'?' leader':''}">${m1.role==='leader'?'★':''}${m1.name}</div>`;
        if (!m0 && !m1) html += '<div style="color:#ccc;text-align:center;font-size:.85em;padding:4px">-</div>';
        html += '</td>';
      });
      html += '</tr>';
    }

    // 빈자리 신청/취소 행 (빈자리 있거나 내가 배정된 슬롯이 있으면 표시)
    const hasAnyVacancyOrAssigned = FIXED_COLS.some((col,ci) => {
      const ds = colDates[ci];
      if (ds < monthFirst || ds > monthLast) return false;
      const sk = `${col.id}__${ds}`;
      const teams = asgn[sk]?.teams || [];
      const total = teams.reduce((s,t) => s+(t.members?.length||0), 0);
      const userInSlot = teams.some(t => t.members?.some(x => x.name === currentUser?.name));
      return total < MAX_PER_SLOT || userInSlot;
    });
    if (hasAnyVacancyOrAssigned) {
      html += `<tr><td class="result-td-team" style="font-size:.72em;color:#718096;line-height:1.2">신청/<br>취소</td>`;
      FIXED_COLS.forEach((col,ci) => {
        const ds = colDates[ci];
        const inMonth = ds >= monthFirst && ds <= monthLast;
        const sk = `${col.id}__${ds}`;
        if (!inMonth) { html += '<td class="result-td-slot" style="background:#f0f2f5;opacity:.35"></td>'; return; }
        const teams = asgn[sk]?.teams || [];
        const total = teams.reduce((s,t) => s+(t.members?.length||0), 0);
        const userInSlot = teams.some(t => t.members?.some(x => x.name === currentUser?.name));
        html += `<td class="result-td-slot" style="text-align:center;padding:3px 2px">`;
        if (userInSlot) {
          html += `<button onclick="cancelAssignment('${ym}','${sk}')" style="background:#fff5f5;color:#e53e3e;border:1px solid #feb2b2;border-radius:7px;padding:4px 3px;font-size:.72em;font-weight:700;cursor:pointer;width:100%;min-height:26px">✓배정<br>취소</button>`;
        } else if (total < MAX_PER_SLOT) {
          html += `<button onclick="fillVacancy('${ym}','${sk}')" style="background:#ebf4ff;color:#2b6cb0;border:none;border-radius:7px;padding:4px 3px;font-size:.72em;font-weight:700;cursor:pointer;width:100%;min-height:26px">신청</button>`;
        } else {
          html += `<div style="font-size:.72em;color:#a0aec0">마감</div>`;
        }
        html += '</td>';
      });
      html += '</tr>';
    }

    html += '</tbody></table></div></div>';
  }
  return html;
}

async function cancelAssignment(ym, slotKey) {
  if (!currentUser) return;
  if (!confirm('이 타임 배정을 취소하시겠습니까?')) return;

  const snap = await db.ref(`confirmedAssignments/${ym}/${slotKey}`).get();
  const slotData = snap.val() || {teams: []};
  const teams = JSON.parse(JSON.stringify(slotData.teams || []));

  // 팀에서 현재 사용자 제거 (1명만 남은 팀은 팀 자체 삭제)
  const newTeams = teams
    .map(t => ({...t, members: (t.members || []).filter(x => x.name !== currentUser.name)}))
    .filter(t => t.members && t.members.length > 0);

  // submissions에서도 해당 슬롯 제거
  const volSubKey = slotKey.replace(/^sat-aft-[18]__/, 'sat-aft__');
  const snapSub = await db.ref(`submissions/${ym}/${currentUser.name}`).get();
  const subData = snapSub.val() || {};
  const newSlots = (subData.slots || []).filter(s => s !== volSubKey && s !== slotKey);

  const updates = {
    [`confirmedAssignments/${ym}/${slotKey}/teams`]: newTeams,
    [`assignments/${ym}/${slotKey}/teams`]: newTeams,
    [`submissions/${ym}/${currentUser.name}/slots`]: newSlots,
  };

  await db.ref().update(updates);
  confirmedListenerYM = null;
  adminAssignListenerYM = null;
  await volLoadAndRender();
}

async function fillVacancy(ym, slotKey) {
  if (!currentUser) return;

  // 현재 슬롯 데이터 로드
  const snap = await db.ref(`confirmedAssignments/${ym}/${slotKey}`).get();
  const slotData = snap.val() || {teams: []};
  const teams = JSON.parse(JSON.stringify(slotData.teams || []));
  const total = teams.reduce((s,t) => s+(t.members?.length||0), 0);
  if (total >= MAX_PER_SLOT) { alert('이미 정원이 찼습니다.'); return; }
  if (teams.some(t => t.members?.some(x => x.name === currentUser.name))) {
    alert('이미 이 타임에 배정되어 있습니다.'); return;
  }

  // ── 토요일 오후: 1공구↔8공구 같은 날 중복 신청 방지 ──
  const isSatAft = /^sat-aft-[18]__/.test(slotKey);
  let siblingKey = null, sibTeams = [];
  if (isSatAft) {
    siblingKey = slotKey.startsWith('sat-aft-1__')
      ? slotKey.replace('sat-aft-1__', 'sat-aft-8__')
      : slotKey.replace('sat-aft-8__', 'sat-aft-1__');
    const snapSib = await db.ref(`confirmedAssignments/${ym}/${siblingKey}`).get();
    sibTeams = snapSib.val()?.teams || [];
    if (sibTeams.some(t => t.members?.some(x => x.name === currentUser.name))) {
      alert('같은 날 다른 공구에 이미 배정되어 있습니다.'); return;
    }
  }

  // ── 배우자 확인 ──
  let spouseInfo = null;
  if (currentUser.spouseId && members[currentUser.spouseId]) {
    const spouseMem = members[currentUser.spouseId];
    const volSlotKey = slotKey.replace(/^sat-aft-[18]__/, 'sat-aft__');
    const snapSpouse = await db.ref(`submissions/${ym}/${spouseMem.name}`).get();
    const spouseSub = snapSpouse.val();
    let spouseApplied = !!(spouseSub?.slots &&
      (spouseSub.slots.includes(volSlotKey) || spouseSub.slots.includes(slotKey)));
    // 배우자가 sibling 슬롯(다른 공구)에 이미 배정됐으면 커플 동반 불가
    if (spouseApplied && sibTeams.some(t => t.members?.some(x => x.name === spouseMem.name))) {
      spouseApplied = false;
    }
    if (spouseApplied) spouseInfo = spouseMem;
  }

  const confirmMsg = spouseInfo
    ? `배우자(${spouseInfo.name})도 같은 타임에 신청되어 있습니다.\n커플로 함께 배정하시겠습니까?`
    : '해당 타임에 신청하시겠습니까?';
  if (!confirm(confirmMsg)) return;

  const spouseInSlot = spouseInfo && teams.some(t => t.members?.some(x => x.name === spouseInfo.name));
  const myMember = {name:currentUser.name, gender:currentUser.gender, role:'member'};

  if (spouseInfo && !spouseInSlot && total + 2 <= MAX_PER_SLOT) {
    // 커플 팀으로 추가
    teams.push({members:[
      myMember,
      {name:spouseInfo.name, gender:spouseInfo.gender, role:'member'},
    ]});
  } else {
    // 팀 합류 우선순위:
    // 1순위) 내 배우자가 단독으로 있는 팀 (부부 팀 완성)
    // 2순위) 동성이 단독으로 있는 팀 (동성 짝)
    // 3순위) 새 팀 생성 (부부 아닌 혼성 팀 방지)
    const mySpouseName = currentUser.spouseId ? members[currentUser.spouseId]?.name : null;
    let targetTeam = null;
    if (mySpouseName) {
      targetTeam = teams.find(t => t.members?.length === 1 && t.members[0].name === mySpouseName);
    }
    if (!targetTeam) {
      targetTeam = teams.find(t => t.members?.length === 1 && t.members[0].gender === currentUser.gender);
    }
    if (targetTeam) {
      targetTeam.members = [...targetTeam.members, myMember];
    } else {
      teams.push({members: [myMember]});
    }
  }

  // confirmedAssignments와 assignments 둘 다 업데이트 (관리자 뷰 동기화)
  const updates = {
    [`confirmedAssignments/${ym}/${slotKey}/teams`]: teams,
    [`assignments/${ym}/${slotKey}/teams`]: teams,
  };

  // submissions에도 기록해서 신청 현황·통계에 반영
  const volSubKey = slotKey.replace(/^sat-aft-[18]__/, 'sat-aft__');

  const snapMySub = await db.ref(`submissions/${ym}/${currentUser.name}`).get();
  const mySub = snapMySub.val() || {};
  const mySlots = mySub.slots ? [...mySub.slots] : [];
  if (!mySlots.includes(volSubKey)) mySlots.push(volSubKey);
  updates[`submissions/${ym}/${currentUser.name}`] = {
    slots: mySlots,
    timestamp: mySub.timestamp || Date.now(),
    gender: currentUser.gender,
    memberId: currentUser.id,
  };

  // 배우자도 함께 추가된 경우 배우자 submission도 업데이트
  const addedSpouse = spouseInfo && !spouseInSlot && total + 2 <= MAX_PER_SLOT;
  if (addedSpouse) {
    const snapSpouseSub = await db.ref(`submissions/${ym}/${spouseInfo.name}`).get();
    const spouseSub = snapSpouseSub.val() || {};
    const spouseSlots = spouseSub.slots ? [...spouseSub.slots] : [];
    if (!spouseSlots.includes(volSubKey)) spouseSlots.push(volSubKey);
    updates[`submissions/${ym}/${spouseInfo.name}`] = {
      slots: spouseSlots,
      timestamp: spouseSub.timestamp || Date.now(),
      gender: spouseInfo.gender,
      memberId: currentUser.spouseId,
    };
  }

  await db.ref().update(updates);
  // 리스너가 re-render 트리거 (confirmedListenerYM 리셋해서 강제 재실행)
  confirmedListenerYM = null;
  adminAssignListenerYM = null;
  await volLoadAndRender();
}

function renderVolSlots(ym) {
  const [y, m] = ym.split('-').map(Number);
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const daysInMonth = new Date(y, m, 0).getDate();
  const firstDow = new Date(y, m - 1, 1).getDay(); // 1일의 요일

  // 요일 헤더
  let html = '<div class="cal-wrap"><div class="cal-grid">';
  ['일','월','화','수','목','금','토'].forEach(d => {
    html += `<div class="cal-dow">${d}</div>`;
  });

  // 빈 셀 (첫 주 앞쪽)
  for (let i = 0; i < firstDow; i++) {
    html += '<div class="cal-cell empty"></div>';
  }

  // 날짜 셀
  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(y, m - 1, d);
    const dow = dt.getDay();
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const slots = VOL_SLOTS.filter(s => s.day === dow);
    const isToday = dateStr === todayStr;
    const isSun = dow === 0, isSat = dow === 6;

    let cellCls = 'cal-cell';
    if (isSun) cellCls += ' sun';
    if (isSat) cellCls += ' sat';
    if (isToday) cellCls += ' today';

    html += `<div class="${cellCls}">
      <div class="cal-date">${d}</div>`;

    for (const slot of slots) {
      const slotKey = `${slot.id}__${dateStr}`;
      const on = volSelectedSlots.has(slotKey);
      // 슬롯 짧은 이름
      const shortLabel = slotShortLabel(slot.label);
      const bg = on ? slot.color : '#f0f4f8';
      const txtColor = on ? '#2d3748' : '#a0aec0';
      html += `<div class="cal-slot-chip${on?' on':''}"
        style="background:${bg};color:${txtColor}"
        onclick="volToggleSlot('${slotKey}')">${shortLabel}</div>`;
    }
    html += '</div>';
  }

  // 마지막 주 나머지 빈 셀
  const totalCells = firstDow + daysInMonth;
  const remainder = totalCells % 7;
  if (remainder !== 0) {
    for (let i = remainder; i < 7; i++) html += '<div class="cal-cell empty"></div>';
  }
  html += '</div></div>'; // cal-grid + cal-wrap 닫기

  // 선택된 타임 요약 패널
  const selected = [...volSelectedSlots].sort();
  if (selected.length > 0) {
    html += `<div class="selected-panel">
      <div class="selected-panel-title">선택된 타임 (${selected.length}개)</div>
      <div class="selected-chips">`;
    for (const sk of selected) {
      const [slotId, dateStr] = sk.split('__');
      const slot = VOL_SLOTS.find(s => s.id === slotId);
      const [, mo, dd] = dateStr.split('-');
      const label = `${parseInt(mo)}/${parseInt(dd)} ${slot?.label || slotId}`;
      const bg = slot?.color ? slot.color + '30' : '#ebf4ff';
      const border = slot?.color ? slot.color + '80' : '#5a67d855';
      html += `<span class="selected-chip" style="background:${bg};border-color:${border};color:#2d3748">
        ${label}
        <button class="chip-remove" onclick="volToggleSlot('${sk}')">✕</button>
      </span>`;
    }
    html += '</div></div>';
  } else {
    html += `<div class="selected-panel">
      <div class="selected-empty">달력에서 원하는 타임을 탭해서 선택하세요.</div>
    </div>`;
  }

  document.getElementById('volSlotsContainer').innerHTML = html;
}

// 슬롯 짧은 이름 (달력 셀에 표시)
function slotShortLabel(label) {
  const map = {
    '월요일 저녁':'저녁','화요일 저녁':'저녁','수요일 저녁':'저녁',
    '금요일 새벽':'새벽','금요일 저녁':'저녁','토요일 오후':'오후'
  };
  return map[label] || label;
}

function volToggleSlot(slotKey) {
  if (volSelectedSlots.has(slotKey)) {
    volSelectedSlots.delete(slotKey);
  } else {
    volSelectedSlots.add(slotKey);
  }
  // Firebase 재요청 없이 로컬 상태로 달력만 다시 그림
  renderVolSlots(currentYM);
}

function volClearAll() {
  volSelectedSlots.clear();
  renderVolSlots(currentYM);
}

async function volSubmit() {
  const ym = currentYM;
  const slots = [...volSelectedSlots];
  await db.ref(`submissions/${ym}/${currentUser.name}`).set({
    slots,
    timestamp: Date.now(),
    gender: currentUser.gender,
    memberId: currentUser.id
  });
  show('volSubmitSuccess');
  document.getElementById('volSubmitBtn').textContent = '수정 완료';
  await volLoadAndRender();
}

async function enterAdminScreen() {

async function adminTab(tab, el) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  currentAdminTab = tab;
  ['tabStatus','tabAssign','tabStats','tabMembers'].forEach(id => hide(id));
  show('tab' + tab.charAt(0).toUpperCase() + tab.slice(1));
  if (tab === 'status') await renderStatusTab(adminYM);
  else if (tab === 'assign') await renderAssignTab(adminYM);
  else if (tab === 'stats') await renderStatsTab(adminYM);
  else if (tab === 'members') renderMembersTab();
}

async function adminChangeMonth(dir) {
  const [y, m] = adminYM.split('-').map(Number);
  const nd = new Date(y, m - 1 + dir, 1);
  adminYM = `${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}`;
  assignEditMode = false;
  // 월이 바뀌면 리스너 리셋
  adminAssignListenerYM = null;
  adminSubsListenerYM = null;
  if (currentAdminTab === 'status') await renderStatusTab(adminYM);
  else if (currentAdminTab === 'assign') await renderAssignTab(adminYM);
  else if (currentAdminTab === 'stats') await renderStatsTab(adminYM);
}

// ── 탭1: 신청 현황 ──
async function renderStatusTab(ym) {
  const snap = await db.ref(`submissions/${ym}`).get();
  const subs = snap.val() || {};
  submissions = subs;

  // 확정 배정 데이터도 읽어서 배정표 기준으로 신청자 보완
  const snapC = await db.ref(`confirmedAssignments/${ym}`).get();
  const confirmed = snapC.val() || {};

  // confirmedAssignments에서 이름→슬롯키 목록 추출
  const confirmedNameSlots = {}; // name → [slotKey, ...]
  for (const [slotKey, data] of Object.entries(confirmed)) {
    if (!data?.teams) continue;
    for (const team of data.teams) {
      for (const x of (team.members || [])) {
        if (!confirmedNameSlots[x.name]) confirmedNameSlots[x.name] = [];
        if (!confirmedNameSlots[x.name].includes(slotKey))
          confirmedNameSlots[x.name].push(slotKey);
      }
    }
  }

  const memberList = Object.values(members);
  const totalMembers = memberList.length;
  const activeNames = new Set(memberList.map(m => m.name));

  // submissions + confirmedAssignments 합산해서 신청 완료 판단
  const submittedNamesSet = new Set([
    ...Object.keys(subs).filter(n => activeNames.has(n)),
    ...Object.keys(confirmedNameSlots).filter(n => activeNames.has(n)),
  ]);
  const totalSubmitted = submittedNamesSet.size;
  const notSubmitted = memberList.filter(m => !submittedNamesSet.has(m.name));

  // 슬롯별 신청자 (submissions 기준)
  const slotMap = {}; // slotKey → [name,...]
  for (const [name, d] of Object.entries(subs)) {
    if (!d || !d.slots) continue;
    for (const sk of d.slots) {
      if (!slotMap[sk]) slotMap[sk] = [];
      slotMap[sk].push(name);
    }
  }

  // confirmedAssignments에서 submissions에 없는 사람 슬롯맵에 추가
  for (const [name, slotKeys] of Object.entries(confirmedNameSlots)) {
    if (!activeNames.has(name) || subs[name]) continue; // submissions에 이미 있으면 skip
    for (const sk of slotKeys) {
      if (!slotMap[sk]) slotMap[sk] = [];
      if (!slotMap[sk].includes(name)) slotMap[sk].push(name);
    }
  }

  let html = `
    <div class="result-month-nav">
      <button class="month-nav-btn" onclick="adminChangeMonth(-1)">◀</button>
      <h3>${ymToLabel(ym)} 신청 현황</h3>
      <button class="month-nav-btn" onclick="adminChangeMonth(1)">▶</button>
    </div>
    <div class="summary-grid" style="grid-template-columns:1fr 1fr;margin-bottom:16px">
      <div class="summary-card"><div class="summary-num">${totalSubmitted}</div><div class="summary-label">신청 완료</div></div>
      <div class="summary-card"><div class="summary-num" style="color:#e53e3e">${totalMembers - totalSubmitted}</div><div class="summary-label">미신청</div></div>
    </div>`;

  // 슬롯별 신청자 카드 (날짜별로 그룹)
  // 슬롯키 형식: "mon-eve__YYYY-MM-DD"
  const sortedKeys = Object.keys(slotMap).sort();
  if (sortedKeys.length === 0) {
    html += '<div style="text-align:center;color:#a0aec0;padding:30px">신청 내역이 없습니다.</div>';
  } else {
    // 날짜별 그룹
    const byDate = {};
    for (const sk of sortedKeys) {
      const [slotId, dateStr] = sk.split('__');
      if (!byDate[dateStr]) byDate[dateStr] = [];
      byDate[dateStr].push({slotId, dateStr, sk});
    }
    for (const [dateStr, items] of Object.entries(byDate).sort()) {
      const dt = new Date(dateStr + 'T00:00:00');
      const [y,mo,d] = dateStr.split('-');
      const dayLabel = `${parseInt(mo)}월 ${parseInt(d)}일 (${DAY_LABELS[dt.getDay()]})`;
      html += `<div style="font-size:.8em;font-weight:700;color:#a0aec0;margin:14px 0 6px;text-transform:uppercase">${dayLabel}</div>`;
      for (const {slotId, sk} of items) {
        const slot = VOL_SLOTS.find(s => s.id === slotId)
          || ASSIGN_SLOTS?.find(s => s.id === slotId)
          || {label: slotId, color:'#ddd'};
        const names = slotMap[sk] || [];
        const full = names.length >= MAX_PER_SLOT;
        html += `<div class="slot-status-item">
          <div class="slot-status-header">
            <div class="slot-status-title">
              <div style="width:10px;height:10px;border-radius:50%;background:${slot.color}"></div>
              ${slot.label}
            </div>
            <span class="badge ${full?'badge-y':'badge-g'}">${names.length}/${MAX_PER_SLOT}</span>
          </div>
          <div class="slot-members">
            ${names.map(n => {
              const m = memberList.find(x => x.name === n);
              const gc = m?.gender === '형제' ? 'member-chip-b' : 'member-chip-s';
              return `<span class="member-chip ${gc}" style="display:inline-flex;align-items:center;gap:3px">${n}<button onclick="deleteSubmission('${ym}','${n}')" style="background:none;border:none;cursor:pointer;color:inherit;opacity:.55;font-size:.85em;padding:0;line-height:1" title="신청 삭제">✕</button></span>`;
            }).join('')}
          </div>
        </div>`;
      }
    }
  }

  // 미신청자
  html += `<div class="not-submitted-list" style="margin-top:16px">
    <div style="font-weight:700;font-size:.9em;margin-bottom:10px">
      ⚠️ 미신청자 (${notSubmitted.length}명)
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${notSubmitted.map(m => {
        const gc = m.gender === '형제' ? 'member-chip-b' : 'member-chip-s';
        return `<span class="member-chip ${gc}">${m.name}</span>`;
      }).join('') || '<span style="color:#a0aec0;font-size:.85em">없음</span>'}
    </div>
  </div>`;

  document.getElementById('tabStatus').innerHTML = html;
  setupAdminAssignListener(ym);
  setupAdminSubsListener(ym);
}

async function deleteSubmission(ym, name) {
  if (!confirm(`'${name}'의 ${ymToLabel(ym)} 신청을 삭제하시겠습니까?`)) return;
  await db.ref(`submissions/${ym}/${name}`).remove();
  await renderStatusTab(ym);
}

// ── 탭2: 자동 배정 ──
async function renderAssignTab(ym) {
  const snap  = await db.ref(`submissions/${ym}`).get();
  submissions = snap.val() || {};
  const snapA = await db.ref(`assignments/${ym}`).get();
  assignments = snapA.val() || {};
  const snapC = await db.ref(`confirmedAssignments/${ym}`).get();
  const confirmed = snapC.exists();
  // 확정 데이터가 있으면 그것을 표시에 사용 (빈자리 신청 등 실시간 변경 반영)
  const displayData = confirmed ? (snapC.val() || assignments) : assignments;

  // 월 네비게이션 + 액션 버튼
  let html = `
    <div class="result-month-nav">
      <button class="month-nav-btn" onclick="adminChangeMonth(-1)">◀</button>
      <h3>${ymToLabel(ym)}</h3>
      <button class="month-nav-btn" onclick="adminChangeMonth(1)">▶</button>
    </div>
    <div class="result-action-bar">
      <button class="btn btn-primary" onclick="runAssignment('${ym}')">🎯 배정 실행</button>
      ${Object.keys(displayData).length > 0 ? `
        <button class="btn ${assignEditMode?'btn-orange':'btn-gray'}" onclick="toggleAssignEdit('${ym}')">
          ${assignEditMode ? '✅ 수정 완료' : '✏️ 수동 수정'}
        </button>
        <button class="btn btn-success" onclick="confirmAssignment('${ym}')">📌 배정 확정</button>
        <button class="btn btn-gray" onclick="captureResult()">📷 이미지 복사</button>
        <button class="btn btn-danger" style="font-size:.82em;padding:9px 12px" onclick="resetAssignment('${ym}')">🗑️ 초기화</button>
      ` : `
        <button class="btn btn-danger" style="font-size:.82em;padding:9px 12px" onclick="resetAssignment('${ym}')">🗑️ 확정 초기화</button>
      `}
    </div>
    ${confirmed ? '<div class="confirmed-badge">📌 이 달 배정이 확정되었습니다.</div>' : ''}
  `;

  if (Object.keys(displayData).length === 0) {
    html += '<div style="text-align:center;color:#a0aec0;padding:40px;background:#fff;border-radius:14px">아직 배정 결과가 없습니다.<br>위 버튼을 눌러 배정을 실행하세요.</div>';
  } else {
    // assignments를 displayData로 동기화 (수동 수정 시 확정 데이터 기준)
    if (confirmed) assignments = displayData;
    html += `<div id="assignResultArea">${renderAssignCalendar(assignments, ym)}</div>`;
  }

  document.getElementById('tabAssign').innerHTML = html;
  setupAdminAssignListener(ym);
  setupAdminSubsListener(ym);
}

function setupAdminAssignListener(ym) {
  if (adminAssignListenerYM === ym) return; // 이미 이 달 리스닝 중
  if (adminAssignListenerRef && adminAssignListenerCb) {
    adminAssignListenerRef.off('value', adminAssignListenerCb);
  }
  let initialSkip = true;
  adminAssignListenerCb = () => {
    if (initialSkip) { initialSkip = false; return; }
    if (!isAdmin || document.getElementById('adminScreen').classList.contains('hidden')) return;
    // 수동 수정 중이 아닐 때만 자동 갱신
    if (currentAdminTab === 'assign' && !assignEditMode) renderAssignTab(ym);
    else if (currentAdminTab === 'status') renderStatusTab(ym);
    else if (currentAdminTab === 'stats') renderStatsTab(ym);
  };
  adminAssignListenerRef = db.ref(`confirmedAssignments/${ym}`);
  adminAssignListenerRef.on('value', adminAssignListenerCb);
  adminAssignListenerYM = ym;
}

function setupAdminSubsListener(ym) {
  if (adminSubsListenerYM === ym) return;
  if (adminSubsListenerRef && adminSubsListenerCb) {
    adminSubsListenerRef.off('value', adminSubsListenerCb);
  }
  let initialSkip = true;
  adminSubsListenerCb = () => {
    if (initialSkip) { initialSkip = false; return; }
    if (!isAdmin || document.getElementById('adminScreen').classList.contains('hidden')) return;
    if (currentAdminTab === 'status') renderStatusTab(ym);
    else if (currentAdminTab === 'stats') renderStatsTab(ym);
  };
  adminSubsListenerRef = db.ref(`submissions/${ym}`);
  adminSubsListenerRef.on('value', adminSubsListenerCb);
  adminSubsListenerYM = ym;
}

function renderAssignCalendar(asgn, ym) {
  const allKeys = Object.keys(asgn).filter(k => asgn[k]);
  if (allKeys.length === 0)
    return '<div style="text-align:center;color:#a0aec0;padding:30px">배정 결과가 없습니다.</div>';

  const [y, m] = ym.split('-').map(Number);

  // 날짜 문자열 유틸
  function dateStr(y2, m2, d2) {
    return `${y2}-${String(m2).padStart(2,'0')}-${String(d2).padStart(2,'0')}`;
  }
  function addDays(ds, n) {
    const [yy, mm, dd] = ds.split('-').map(Number);
    const dt = new Date(yy, mm - 1, dd + n);
    return dateStr(dt.getFullYear(), dt.getMonth() + 1, dt.getDate());
  }
  function getMondayStr(ds) {
    const [yy, mm, dd] = ds.split('-').map(Number);
    const dow = new Date(yy, mm - 1, dd).getDay(); // 0=일
    return addDays(ds, dow === 0 ? -6 : 1 - dow);
  }

  const monthFirstStr = dateStr(y, m, 1);
  const monthLastStr  = dateStr(y, m, new Date(y, m, 0).getDate());
  const firstMon      = getMondayStr(monthFirstStr);

  // 주차별 월요일 수집 (배정 결과에 있는 날짜 기준)
  const weekSet = new Set(allKeys.map(sk => getMondayStr(sk.split('__')[1])));
  const sortedWeeks = [...weekSet].sort();

  // 고정 7컬럼 정의 (월요일 기준 dayOffset)
  const FIXED_COLS = [
    { id:'mon-eve',   off:0, label:'월 저녁' },
    { id:'tue-eve',   off:1, label:'화 저녁' },
    { id:'wed-eve',   off:2, label:'수 저녁' },
    { id:'fri-dawn',  off:4, label:'금 새벽' },
    { id:'fri-eve',   off:4, label:'금 저녁' },
    { id:'sat-aft-1', off:5, label:'토 오후<br>1공구' },
    { id:'sat-aft-8', off:5, label:'토 오후<br>8공구' },
  ];

  let html = '';

  for (const monStr of sortedWeeks) {
    // 각 컬럼의 날짜 계산
    const colDates = FIXED_COLS.map(col => addDays(monStr, col.off));

    // 월 안에 속하는 날짜만 범위 레이블에 사용
    const inMonthDates = colDates.filter(ds => ds >= monthFirstStr && ds <= monthLastStr);
    if (inMonthDates.length === 0) continue;
    const [, rfm, rfd] = inMonthDates[0].split('-').map(Number);
    const [, rlm, rld] = inMonthDates[inMonthDates.length - 1].split('-').map(Number);

    // 주차 번호
    const weekNum = Math.round(
      (new Date(monStr) - new Date(firstMon)) / (7 * 86400000)
    ) + 1;

    // 이 주에서 실제 배정된 슬롯의 최대 팀 수
    const maxTeams = Math.max(3, ...FIXED_COLS.map((col, ci) => {
      const sk = `${col.id}__${colDates[ci]}`;
      return asgn[sk]?.teams?.length || 0;
    }));
    // 수동 수정 모드에서는 팀 추가를 위해 행 하나 더 표시 (최대 팀 수 초과 불가)
    const MAX_TEAMS = Math.floor(MAX_PER_SLOT / 2);
    const displayMaxTeams = assignEditMode ? Math.min(maxTeams + 1, MAX_TEAMS) : maxTeams;

    html += `<div class="result-week-section">
      <div class="result-week-title">📅 ${weekNum}주차 (${rfm}/${rfd}~${rlm}/${rld})</div>
      <div class="result-table-wrap"><table class="result-table"><thead><tr>`;
    html += '<th class="result-th-team">팀</th>';

    // 헤더 행
    FIXED_COLS.forEach((col, ci) => {
      const ds       = colDates[ci];
      const inMonth  = ds >= monthFirstStr && ds <= monthLastStr;
      const slotDef  = ASSIGN_SLOTS.find(s => s.id === col.id);
      const color    = inMonth ? (SLOT_COLORS[slotDef?.label] || '#e2e8f0') : '#f0f2f5';
      const [, mo, dd] = ds.split('-').map(Number);
      html += `<th class="result-th-slot" style="background:${color}${inMonth ? '' : ';opacity:.35'}">
        <div class="result-th-label">${col.label}</div>
        <div class="result-th-date">${inMonth ? `${mo}/${dd}` : '-'}</div>
      </th>`;
    });
    html += '</tr></thead><tbody>';

    // 팀 행
    for (let ti = 0; ti < displayMaxTeams; ti++) {
      const isExtraRow = ti >= maxTeams; // 팀 추가용 여분 행
      html += `<tr><td class="result-td-team">${ti + 1}팀</td>`;
      FIXED_COLS.forEach((col, ci) => {
        const ds      = colDates[ci];
        const inMonth = ds >= monthFirstStr && ds <= monthLastStr;
        const sk      = `${col.id}__${ds}`;
        const slotDef = ASSIGN_SLOTS.find(s => s.id === col.id);
        const color   = SLOT_COLORS[slotDef?.label] || '#e2e8f0';
        if (!inMonth) {
          html += '<td class="result-td-slot" style="background:#f0f2f5;opacity:.35"></td>';
          return;
        }
        const team = asgn[sk]?.teams?.[ti];
        const m0   = team?.members?.[0];
        const m1   = team?.members?.[1];
        html += `<td class="result-td-slot" style="background:${color}22">`;
        if (isExtraRow && assignEditMode) {
          // 여분 행: 첫 번째 멤버 추가 버튼만 표시
          html += `<div class="result-name-row editable" style="color:#a0aec0;border:1px dashed #cbd5e0;text-align:center" onclick="openNamePicker('${sk}',${ti},0,'')">+ 추가</div>`;
        } else {
          [m0, m1].forEach((mem, mi) => {
            if (!mem) {
              if (assignEditMode)
                html += `<div class="result-name-row editable" style="color:#a0aec0;border:1px dashed #cbd5e0;text-align:center" onclick="openNamePicker('${sk}',${ti},${mi},'')">+ 추가</div>`;
              return;
            }
            const isLeader = mem.role === 'leader';
            const cls = 'result-name-row' + (isLeader ? ' leader' : '') + (assignEditMode ? ' editable' : '');
            const ev  = assignEditMode ? `onclick="openNamePicker('${sk}',${ti},${mi},'${mem.name}')"` : '';
            html += `<div class="${cls}" ${ev}>${isLeader ? '★' : ''}${mem.name}</div>`;
          });
          if (!m0 && !m1 && !assignEditMode) html += '<div style="color:#ccc;text-align:center;font-size:.85em;padding:4px">-</div>';
        }
        html += '</td>';
      });
      html += '</tr>';
    }
    html += '</tbody></table></div></div>';
  }

  return html;
}

function renderSlotBlock(slotKey, data) {
  const [slotId] = slotKey.split('__');
  const slotDef  = ASSIGN_SLOTS.find(s => s.id === slotId);
  const label    = slotDef ? slotDef.label : slotId;
  const color    = SLOT_COLORS[label] || '#e2e8f0';
  const teams    = data.teams || [];
  const total    = teams.reduce((a, t) => a + (t.members?.length || 0), 0);

  let html = `<div class="result-slot-block">
    <div class="result-slot-title" style="border-left:4px solid ${color}">
      <span>${label}</span>
      <span class="badge badge-g">${total}명</span>
    </div>`;

  if (teams.length === 0) {
    html += '<div style="padding:12px;text-align:center;color:#a0aec0;font-size:.85em">배정 없음</div>';
  } else {
    teams.forEach((team, ti) => {
      const m0 = team.members?.[0];
      const m1 = team.members?.[1];
      html += `<div class="result-team-row">
        ${renderNameChip(slotKey, ti, 0, m0)}
        ${renderNameChip(slotKey, ti, 1, m1)}
      </div>`;
    });
  }
  return html + '</div>';
}

  if (!assignEditMode) {
    // 수정 완료 — Firebase에 저장 (assignments + 확정 데이터가 있으면 confirmedAssignments도 업데이트)

// ── 이름 선택 모달 ──
async function openNamePicker(slotKey, teamIdx, memberIdx, currentName) {
  editingSlotKey   = slotKey;
  editingTeamIdx   = teamIdx;
  editingMemberIdx = memberIdx;
  document.getElementById('namePickerCurrent').textContent = `현재: ${currentName}`;
  document.getElementById('namePickerList').innerHTML =
    '<div style="text-align:center;padding:20px;color:#a0aec0;font-size:.9em">로딩 중...</div>';
  document.getElementById('namePickerModal').classList.remove('hidden');

  // members가 비어있으면 Firebase에서 다시 로드
  if (Object.keys(members).length === 0) {
    try { await loadMembers(); } catch(e) { console.error(e); }
  }

  // 팀1 첫 번째 자리(인도자석)는 canLead 인원만 표시
  const isLeaderSlot = (editingTeamIdx === 0 && editingMemberIdx === 0);
  let list = Object.values(members);
  if (isLeaderSlot) list = list.filter(m => m.canLead);
  list.sort((a,b) => {
    if (a.gender !== b.gender) return a.gender === '형제' ? -1 : 1;
    return a.name.localeCompare(b.name, 'ko');
  });

  const leaderNote = isLeaderSlot ? `<div style="grid-column:1/-1;font-size:.75em;color:#805ad5;padding:4px 6px;background:#faf5ff;border-radius:6px;margin-bottom:4px">★ 인도자 자격자만 표시됩니다</div>` : '';
  let html = leaderNote + `<div class="name-picker-item" style="grid-column:1/-1;background:#fff5f5;color:#e53e3e;border-color:#fed7d7" onclick="clearSlotMember()">✕ 빈자리로 설정</div>`;
  for (const m of list) {
    const cls = m.gender === '형제' ? 'brother' : 'sister';
    html += `<div class="name-picker-item ${cls}" onclick="pickName('${m.name}','${m.gender}')">${m.name}</div>`;
  }
  document.getElementById('namePickerList').innerHTML =
    html || '<div style="text-align:center;padding:20px;color:#e53e3e;font-size:.9em">봉사자 목록을 불러올 수 없습니다</div>';
}

function pickName(name, gender) {
  if (!editingSlotKey || editingTeamIdx === null || editingMemberIdx === null) return;
  // 슬롯/팀/멤버 구조가 없으면 생성
  if (!assignments[editingSlotKey]) assignments[editingSlotKey] = { teams: [] };
  const teams = assignments[editingSlotKey].teams;
  while (teams.length <= editingTeamIdx) teams.push({ members: [] });
  if (!teams[editingTeamIdx].members) teams[editingTeamIdx].members = [];
  const team = teams[editingTeamIdx];
  const oldMember = team.members[editingMemberIdx] || {};

  // 팀1 첫 번째 자리는 항상 인도자 — 기존 인도자 역할 해제 후 신규 인도자 지정
  const isLeaderSlot = (editingTeamIdx === 0 && editingMemberIdx === 0);
  if (isLeaderSlot) {
    // 같은 슬롯 내 기존 인도자 role → 'member' 로 변경
    for (const t of teams) {
      for (const m of (t.members || [])) {
        if (m.role === 'leader') m.role = 'member';
      }
    }
  }

  const role = isLeaderSlot ? 'leader' : (oldMember.role || 'member');
  team.members[editingMemberIdx] = { ...oldMember, name, gender, role };
  closeNamePicker();
  document.getElementById('assignResultArea').innerHTML = renderAssignCalendar(assignments, adminYM);
}

function clearSlotMember() {
  if (!editingSlotKey || editingTeamIdx === null || editingMemberIdx === null) return;
  const slot = assignments[editingSlotKey];
  if (!slot?.teams) return;
  const team = slot.teams[editingTeamIdx];
  if (!team?.members) return;
  // 해당 멤버 제거
  team.members.splice(editingMemberIdx, 1);
  // 팀에 멤버가 없으면 팀 자체 제거
  if (team.members.length === 0) {
    slot.teams.splice(editingTeamIdx, 1);
  }
  closeNamePicker();
  document.getElementById('assignResultArea').innerHTML = renderAssignCalendar(assignments, adminYM);
}

function closeNamePicker() {
  document.getElementById('namePickerModal').classList.add('hidden');
  editingSlotKey = editingTeamIdx = editingMemberIdx = null;
}
function closeNamePickerOutside(e) {
  if (e.target === document.getElementById('namePickerModal')) closeNamePicker();
}

// ── 확정 시 빈자리 자동 짝배정 ──
// 빈자리가 있는 슬롯에 미배정 신청자를 커플 우선 → 동성 쌍 순서로 채워 넣는다
function fillVacanciesWithPairing(currentAssignments, subs, mems) {
  // submissions → 슬롯별 신청자 이름 목록
  const slotApplicants = {};
  for (const [name, d] of Object.entries(subs)) {
    if (!d?.slots) continue;
    for (const volSlotKey of d.slots) {
      const [volSlotId, dateStr] = volSlotKey.split('__');
      if (volSlotId === 'sat-aft') {
        ['sat-aft-1', 'sat-aft-8'].forEach(sid => {
          const k = `${sid}__${dateStr}`;
          if (!slotApplicants[k]) slotApplicants[k] = [];
          if (!slotApplicants[k].includes(name)) slotApplicants[k].push(name);
        });
      } else {
        if (!slotApplicants[volSlotKey]) slotApplicants[volSlotKey] = [];
        if (!slotApplicants[volSlotKey].includes(name)) slotApplicants[volSlotKey].push(name);
      }
    }
  }

  const memMap = {};
  for (const [id, m] of Object.entries(mems)) memMap[m.name] = { id, ...m };

  const result = JSON.parse(JSON.stringify(currentAssignments));
  let autoFillCount = 0;

  // 날짜별로 이미 배정된 인원 추적 (토요일 1공구↔8공구 중복 방지)
  const dateAssigned = {};
  for (const [sk, sd] of Object.entries(result)) {
    const dateStr = sk.split('__')[1];
    if (!dateAssigned[dateStr]) dateAssigned[dateStr] = new Set();
    for (const t of (sd.teams || []))
      for (const m of (t.members || []))
        if (m.name) dateAssigned[dateStr].add(m.name);
  }

  for (const [slotKey, slotData] of Object.entries(result)) {
    if (!slotData?.teams) continue;
    const teams = slotData.teams;
    const total = teams.reduce((s, t) => s + (t.members?.length || 0), 0);
    if (total >= MAX_PER_SLOT) continue;

    // 같은 날짜의 다른 슬롯에 이미 배정된 사람도 제외
    const dateStr = slotKey.split('__')[1];
    const alreadyOnDate = dateAssigned[dateStr] || new Set();
    const unassigned = (slotApplicants[slotKey] || []).filter(n => !alreadyOnDate.has(n));
    if (unassigned.length === 0) continue;

    let vacancies = MAX_PER_SLOT - total;
    const selected = new Set();

    // 1) 커플 우선: 배우자가 같은 슬롯에 신청했으면 함께 선발
    const checkedCouple = new Set();
    for (const name of unassigned) {
      if (selected.has(name) || checkedCouple.has(name) || vacancies < 2) continue;
      checkedCouple.add(name);
      const mem = memMap[name];
      if (!mem?.spouseId) continue;
      const spouseEntry = Object.entries(mems).find(([id]) => id === mem.spouseId);
      if (!spouseEntry) continue;
      const spouseName = spouseEntry[1].name;
      if (unassigned.includes(spouseName) && !selected.has(spouseName)) {
        selected.add(name); selected.add(spouseName); vacancies -= 2;
      }
    }

    // 2) 동성 쌍 (형제+형제, 자매+자매)
    const brothers = unassigned.filter(n => !selected.has(n) && memMap[n]?.gender === '형제');
    const sisters  = unassigned.filter(n => !selected.has(n) && memMap[n]?.gender === '자매');
    for (let i = 0; i + 1 < brothers.length && vacancies >= 2; i += 2) {
      selected.add(brothers[i]); selected.add(brothers[i + 1]); vacancies -= 2;
    }
    for (let i = 0; i + 1 < sisters.length && vacancies >= 2; i += 2) {
      selected.add(sisters[i]); selected.add(sisters[i + 1]); vacancies -= 2;
    }

    // 3) 홀수 남은 경우 한 명씩 추가
    const leftBros = brothers.filter(n => !selected.has(n));
    const leftSis  = sisters.filter(n => !selected.has(n));
    if (vacancies > 0 && leftBros.length > 0) { selected.add(leftBros[0]); vacancies--; }
    if (vacancies > 0 && leftSis.length  > 0) { selected.add(leftSis[0]);  vacancies--; }

    if (selected.size === 0) continue;

    // 기존 배정 + 신규 선발 → buildTeams로 팀 재구성 (커플·동성 짝짓기 포함)
    const currentMembers = teams.flatMap(t => t.members || []);
    const leaderMember   = currentMembers.find(m => m.role === 'leader') || null;
    const newMembers     = [...selected].map(n => ({name: n, gender: memMap[n]?.gender || '?', role: 'member'}));
    result[slotKey] = { ...slotData, teams: buildTeams([...currentMembers, ...newMembers], leaderMember, mems) };
    autoFillCount += selected.size;

    // 이번 슬롯에서 새로 배정된 인원을 날짜 추적에 반영 (이후 슬롯 중복 방지)
    if (!dateAssigned[dateStr]) dateAssigned[dateStr] = new Set();
    for (const n of selected) dateAssigned[dateStr].add(n);
  }

  return { assignments: result, autoFillCount };
}

// ── 배정 확정 ──
async function confirmAssignment(ym) {
  if (!confirm(`${ymToLabel(ym)} 배정을 확정하시겠습니까?\n확정 후 통계에 반영됩니다.`)) return;

  // 빈자리 자동 짝배정: 미배정 신청자를 커플/동성 쌍으로 채운다
  const snapS = await db.ref(`submissions/${ym}`).get();
  const subs = snapS.val() || {};
  const { assignments: filledAssignments, autoFillCount } = fillVacanciesWithPairing(assignments, subs, members);

  await db.ref().update({
    [`confirmedAssignments/${ym}`]: filledAssignments,
    [`assignments/${ym}`]: filledAssignments,
  });
  assignments = filledAssignments;

  const msg = autoFillCount > 0
    ? `배정이 확정되었습니다.\n빈자리에 ${autoFillCount}명이 자동으로 짝배정되었습니다.`
    : '배정이 확정되었습니다.';
  alert(msg);
  await renderAssignTab(ym);
}

// ── 배정 초기화 ──
async function resetAssignment(ym) {
  if (!confirm(`⚠️ ${ymToLabel(ym)} 배정을 초기화합니다.\n배정 결과만 삭제됩니다 (신청 현황은 유지).\n되돌릴 수 없습니다. 계속하시겠습니까?`)) return;
  await db.ref().update({
    [`assignments/${ym}`]: null,
    [`confirmedAssignments/${ym}`]: null,
    [`rotation/${ym}`]: null,
  });
  assignments = {};
  assignEditMode = false;
  adminAssignListenerYM = null;
  alert('초기화되었습니다.');
  await renderAssignTab(ym);
}

// ── 이미지 캡처 & 클립보드 ──
async function captureResult() {
  const target = document.getElementById('assignResultArea');
  if (!target) { alert('캡처할 배정 결과가 없습니다.'); return; }
  const btn = document.querySelector('[onclick="captureResult()"]');
  const origTxt = btn?.textContent;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 캡처 중...'; }

  // html2canvas 동적 로드
  if (typeof html2canvas === 'undefined') {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    }).catch(() => {
      alert('캡처 라이브러리 로딩 실패. 인터넷 연결을 확인해주세요.');
      if (btn) { btn.disabled = false; btn.textContent = origTxt; }
      return;
    });
  }

  try {
    const canvas = await html2canvas(target, {
      scale: 2, backgroundColor: '#f0f2f5', useCORS: true, logging: false
    });
    canvas.toBlob(async blob => {
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        if (btn) btn.textContent = '✅ 클립보드 복사됨!';
      } catch(e) {
        // 클립보드 API 미지원 시 다운로드로 대체
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `전시대배정_${adminYM}.png`; a.click();
        URL.revokeObjectURL(url);
        if (btn) btn.textContent = '✅ 이미지 저장됨!';
      }
      setTimeout(() => { if (btn) { btn.textContent = origTxt; btn.disabled = false; } }, 2500);
    });
  } catch(err) {
    alert('캡처 실패: ' + err.message);
    if (btn) { btn.disabled = false; btn.textContent = origTxt; }
  }
}

async function runAssignment(ym) {
  const btns = document.querySelectorAll('.result-action-bar .btn-primary');
  btns.forEach(b => { b.disabled = true; b.textContent = '⏳ 배정 중...'; });

  const snap = await db.ref(`submissions/${ym}`).get();
  submissions = snap.val() || {};
  const snapR = await db.ref(`rotation/${ym}`).get();
  const prevRotation = snapR.val() || {};

  // 이전 달 확정 배정 횟수 로드 (공평성 참고)
  const [y, m] = ym.split('-').map(Number);
  const prevYM  = new Date(y, m - 2, 1);
  const prevYMStr = `${prevYM.getFullYear()}-${String(prevYM.getMonth()+1).padStart(2,'0')}`;
  const snapPrev  = await db.ref(`confirmedAssignments/${prevYMStr}`).get();
  const prevConfirmed = snapPrev.val() || {};
  const prevCounts = {};
  for (const data of Object.values(prevConfirmed)) {

    for (const team of data.teams) {
      for (const x of (team.members || [])) {
        prevCounts[x.name] = (prevCounts[x.name] || 0) + 1;
      }
